<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .pin-box {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .pin-box:focus {
    border-color: #465fff;
    box-shadow: 0 0 0 4px rgba(70, 95, 255, 0.15);
  }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] },
        colors: {
          brand: {
            50: '#f5f7ff', 100: '#ebf0ff', 200: '#dbe4ff', 300: '#c2d0ff',
            400: '#9db2ff', 500: '#6d84ff', 600: '#465fff', 700: '#3446eb',
            800: '#2835c4', 900: '#232ea1', 950: '#15195e'
          }
        }
      }

</script>
</head>
<body class="min-h-screen bg-slate-50 flex overflow-x-hidden">

<!-- Left panel: Premium Presentation -->
<div class="hidden lg:flex lg:w-1/2 bg-slate-950 flex-col items-center justify-center p-12 relative overflow-hidden">
  <!-- Modern gradient backgrounds -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(70,95,255,0.18),transparent_50%)]"></div>
  <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950"></div>
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-brand-600/10 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl"></div>
  
  <div class="relative z-10 text-center max-w-sm">
    <div class="w-20 h-20 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-brand-600/30 ring-1 ring-white/10">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 3H8l-2 4h12l-2-4z"/>
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold text-white mb-3 tracking-wide">IT Borrow System</h1>
    <p class="text-slate-400 text-sm leading-relaxed font-medium">ระบบยืม-คืนอุปกรณ์ไอที สำหรับพนักงาน TQM</p>
    
    <div class="mt-12 grid grid-cols-3 gap-3.5">
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-md shadow-sm">
        <div class="text-2xl font-bold text-brand-400" id="stat-eq">—</div>

      </div>

        <div class="text-[10px] uppercase font-bold text-slate-500 tracking-wider mt-1.5">พร้อมให้ยืม</div>
      </div>
      <div class="bg-white/5 border border-white/10 rounded-2xl p-4 backdrop-blur-md shadow-sm">
        <div class="text-2xl font-bold text-amber-400" id="stat-active">—</div>
        <div class="text-[10px] uppercase font-bold text-slate-500 tracking-wider mt-1.5">กำลังยืม</div>
      </div>

</div>

<!-- Right panel: Interactive Cards -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 md:p-12">
  <div class="w-full max-w-md bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-fade-in">

    <!-- STEP 1: Employee ID Input -->
    <div id="step-empid">
      <div class="mb-8">
        <div class="w-12 h-12 bg-brand-600 rounded-xl flex items-center justify-center mb-6 lg:hidden shadow-lg shadow-brand-600/20">
          <span class="text-white font-extrabold text-base">IT</span>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">เข้าสู่ระบบ</h2>
        <p class="text-slate-500 mt-1 text-sm font-medium">กรอกรหัสพนักงานเพื่อเริ่มต้นทำรายการ</p>
      </div>
      <div class="space-y-6">
        <div>
          <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">รหัสพนักงาน</label>
          <input id="inp-empid" type="text" inputmode="numeric" placeholder="เช่น 511401"
            class="w-full border border-slate-200 rounded-2xl px-4 py-3.5 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400"
            onkeydown="if(event.key==='Enter')checkEmpId()">
        </div>
        <div id="err-empid" class="hidden bg-red-50 text-red-600 text-xs px-4 py-3 rounded-2xl border border-red-100 font-medium leading-relaxed"></div>
        
        <button onclick="checkEmpId()" id="btn-empid"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white py-3.5 rounded-2xl font-bold text-sm shadow-lg shadow-brand-600/25 transition flex items-center justify-center gap-2">
          <span>ถัดไป</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <!-- STEP 2a: Enter PIN -->
    <div id="step-pin" class="hidden">
      <button onclick="backToEmpId()" class="flex items-center gap-1.5 text-xs font-bold text-slate-400 hover:text-slate-700 mb-6 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        <span>ย้อนกลับ</span>
      </button>
      <div class="mb-8">
        <div id="pin-avatar" class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-white text-xl font-bold mb-4 shadow-md shadow-brand-600/10 overflow-hidden"></div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">กรอก PIN</h2>
        <p class="text-slate-500 mt-1 text-sm font-medium">กรอก PIN 6 หลักเพื่อเข้าใช้งานระบบ</p>
      </div>
      <div class="flex gap-2.5 justify-center mb-6" id="pin-boxes">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
      </div>
      <div id="err-pin" class="hidden bg-red-50 text-red-600 text-xs px-4 py-3 rounded-2xl border border-red-100 mb-5 font-medium"></div>
      <button onclick="submitPin()" id="btn-pin"
        class="w-full bg-brand-600 hover:bg-brand-700 text-white py-3.5 rounded-2xl font-bold text-sm shadow-lg shadow-brand-600/25 transition">
        เข้าสู่ระบบ
      </button>
    </div>

    <!-- STEP 2b: Set PIN (first time) -->
    <div id="step-setpin" class="hidden">
      <button onclick="backToEmpId()" class="flex items-center gap-1.5 text-xs font-bold text-slate-400 hover:text-slate-700 mb-6 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        <span>ย้อนกลับ</span>
      </button>
      <div class="mb-6">
        <div class="inline-flex items-center gap-1.5 bg-brand-50 text-brand-700 text-xs font-bold px-3 py-1.5 rounded-xl mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>เข้าใช้งานครั้งแรก</span>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">ตั้งค่า PIN ใหม่</h2>
        <p class="text-slate-500 mt-1 text-sm font-medium">กำหนด PIN 6 หลักสำหรับการเข้าใช้งานครั้งถัดไป</p>
      </div>

      <div class="mb-5">
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">PIN ใหม่</label>
        <div class="flex gap-2.5 justify-center" id="newpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        </div>
      </div>
      <div class="mb-6">
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">ยืนยัน PIN</label>
        <div class="flex gap-2.5 justify-center" id="confirmpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        </div>
      </div>
      <div id="err-setpin" class="hidden bg-red-50 text-red-600 text-xs px-4 py-3 rounded-2xl border border-red-100 mb-5 font-medium"></div>
      <button onclick="submitSetPin()" id="btn-setpin"
        class="w-full bg-brand-600 hover:bg-brand-700 text-white py-3.5 rounded-2xl font-bold text-sm shadow-lg shadow-brand-600/25 transition">
        ยืนยันและเข้าสู่ระบบ
      </button>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script>
var CURRENT_EMP = null;

// ── PIN boxes helper ──────────────────────────────────────────
function initPinBoxes(containerId, onComplete) {
  var boxes = document.querySelectorAll('#' + containerId + ' .pin-box');
  boxes.forEach(function(box, i) {
    box.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(-1);
      if (this.value && i < boxes.length - 1) boxes[i + 1].focus();
      if (i === boxes.length - 1 && getPinValue(containerId).length === 6 && onComplete) onComplete();
    });
    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) boxes[i - 1].focus();
    });
    box.addEventListener('paste', function(e) {
      e.preventDefault();
      var text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      text.split('').forEach(function(ch, j) { if (boxes[j]) boxes[j].value = ch; });
      if (boxes[text.length - 1]) boxes[Math.min(text.length, 5)].focus();
    });
  });
}

function getPinValue(containerId) {
  var boxes = document.querySelectorAll('#' + containerId + ' .pin-box');
  return Array.from(boxes).map(function(b) { return b.value; }).join('');
}
function clearPinBoxes(containerId) {
  document.querySelectorAll('#' + containerId + ' .pin-box').forEach(function(b) { b.value = ''; });
  var first = document.querySelector('#' + containerId + ' .pin-box');
  if (first) first.focus();
}
function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg; el.classList.remove('hidden');
}
function hideErr(id) { document.getElementById(id).classList.add('hidden'); }

function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<svg class="animate-spin w-5 h-5 mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>';
  } else {
    btn.disabled = false;
  }
}

// ── Step 1: Check Employee ID ─────────────────────────────────
function checkEmpId() {
  var id = document.getElementById('inp-empid').value.trim();
  if (!id) { showErr('err-empid', 'กรุณากรอกรหัสพนักงาน'); return; }
  hideErr('err-empid');
  setLoading('btn-empid', true);

  api({ action: 'getEmployee', empId: id })
    .then(function(data) {
      setLoading('btn-empid', false);
      if (!data.found) {
        document.getElementById('btn-empid').innerHTML = '<span>ถัดไป</span><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
        showErr('err-empid', data.reason || 'ไม่พบรหัสพนักงาน');
        return;
      }
      CURRENT_EMP = data;
      if (data.hasPin) {
        showPinStep();
      } else {
        showSetPinStep();
      }
    })
    .catch(function() {
      setLoading('btn-empid', false);
      document.getElementById('btn-empid').innerHTML = '<span>ถัดไป</span><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
      showErr('err-empid', 'ไม่สามารถเชื่อมต่อ API ได้ กรุณาลองใหม่');
    });
}

function backToEmpId() {
  document.getElementById('step-pin').classList.add('hidden');
  document.getElementById('step-setpin').classList.add('hidden');
  document.getElementById('step-empid').classList.remove('hidden');
  document.getElementById('btn-empid').innerHTML = '<span>ถัดไป</span><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
}

// ── Step 2a: Enter existing PIN ───────────────────────────────
function showPinStep() {
  document.getElementById('step-empid').classList.add('hidden');
  document.getElementById('step-pin').classList.remove('hidden');
  var avatar = document.getElementById('pin-avatar');
  if (CURRENT_EMP.avatarUrl) {
    avatar.innerHTML = '<img src="'+CURRENT_EMP.avatarUrl+'" class="w-full h-full object-cover rounded-2xl">';
  } else {
    avatar.textContent = CURRENT_EMP.firstName ? CURRENT_EMP.firstName.charAt(0) : '?';
    avatar.className = 'w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-white text-xl font-bold mb-4 shadow-md shadow-brand-600/10';
  }
  clearPinBoxes('pin-boxes');
  hideErr('err-pin');
  initPinBoxes('pin-boxes', submitPin);
  setTimeout(function() { document.querySelector('#pin-boxes .pin-box').focus(); }, 120);
}

function submitPin() {
  var pin = getPinValue('pin-boxes');
  if (pin.length !== 6) { showErr('err-pin', 'กรุณากรอก PIN ให้ครบ 6 หลัก'); return; }
  hideErr('err-pin');
  setLoading('btn-pin', true);

  api({ action: 'verifyPin', empId: CURRENT_EMP.empId, pin: pin })
    .then(function(data) {
      if (data.ok) {
        sessionStorage.setItem('itb_user', JSON.stringify(data));
        window.location.href = 'index.html';
      } else {
        setLoading('btn-pin', false);
        document.getElementById('btn-pin').textContent = 'เข้าสู่ระบบ';
        clearPinBoxes('pin-boxes');
        showErr('err-pin', data.error || 'PIN ไม่ถูกต้อง');
      }
    })
    .catch(function() {
      setLoading('btn-pin', false);
      document.getElementById('btn-pin').textContent = 'เข้าสู่ระบบ';
      showErr('err-pin', 'เชื่อมต่อไม่ได้ กรุณาลองใหม่');
    });
}

// ── Step 2b: Set PIN (first time) ─────────────────────────────
function showSetPinStep() {
  document.getElementById('step-empid').classList.add('hidden');
  document.getElementById('step-setpin').classList.remove('hidden');
  clearPinBoxes('newpin-boxes');
  clearPinBoxes('confirmpin-boxes');
  hideErr('err-setpin');
  initPinBoxes('newpin-boxes', function() {
    setTimeout(function() { document.querySelector('#confirmpin-boxes .pin-box').focus(); }, 80);
  });
  initPinBoxes('confirmpin-boxes', submitSetPin);
  setTimeout(function() { document.querySelector('#newpin-boxes .pin-box').focus(); }, 120);
}

function submitSetPin() {
  var pin1 = getPinValue('newpin-boxes');
  var pin2 = getPinValue('confirmpin-boxes');
  if (pin1.length !== 6) { showErr('err-setpin', 'กรุณากรอก PIN ให้ครบ 6 หลัก'); return; }
  if (pin1 !== pin2) {
    showErr('err-setpin', 'PIN ไม่ตรงกัน กรุณากรอกใหม่');
    clearPinBoxes('confirmpin-boxes');
    return;
  }
  hideErr('err-setpin');
  setLoading('btn-setpin', true);

  api({ action: 'setPin', empId: CURRENT_EMP.empId, pin: pin1 })
    .then(function(data) {
      if (data.ok) {
        return api({ action: 'verifyPin', empId: CURRENT_EMP.empId, pin: pin1 });
      } else {
        throw new Error(data.error || 'ไม่สามารถตั้ง PIN ได้');
      }
    })
    .then(function(data) {
      if (data.ok) {
        sessionStorage.setItem('itb_user', JSON.stringify(data));
        window.location.href = 'index.html';
      } else {
        throw new Error(data.error || 'เกิดข้อผิดพลาด');
      }
    })
    .catch(function(err) {
      setLoading('btn-setpin', false);
      document.getElementById('btn-setpin').textContent = 'ยืนยันและเข้าสู่ระบบ';
      showErr('err-setpin', err.message || 'เกิดข้อผิดพลาด');
    });
}

// ── Init stats ────────────────────────────────────────────────
if (sessionStorage.getItem('itb_user')) {
  window.location.href = 'index.html';
}

api({ action: 'getLoginStats' }).then(function(d) {
  document.getElementById('stat-eq').textContent    = d.totalEq     || 0;
  document.getElementById('stat-avail').textContent = d.availEq     || 0;
  document.getElementById('stat-active').textContent= d.activeLoans || 0;
}).catch(function() {});

document.getElementById('inp-empid').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkEmpId();
});
</script>
</body>
</html>
