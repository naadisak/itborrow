<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Sarabun', sans-serif; }
  .pin-box:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .btn-primary { background: #465FFF; }
  .btn-primary:hover { background: #3451e0; }
</style>
</head>
<body class="min-h-screen bg-gray-50 flex">

<!-- Left panel -->
<div class="hidden lg:flex lg:w-1/2 bg-gray-900 flex-col items-center justify-center p-12 relative overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-gray-900 to-gray-950"></div>
  <div class="relative z-10 text-center">
    <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 3H8l-2 4h12l-2-4z"/>
      </svg>
    </div>
    <h1 class="text-3xl font-bold text-white mb-3">IT Borrow System</h1>
    <p class="text-gray-400 text-base max-w-xs leading-relaxed">ระบบยืม-คืนอุปกรณ์ไอที สำหรับพนักงาน TQM</p>
    <div class="mt-10 grid grid-cols-3 gap-4 text-center">
      <div class="bg-white/5 rounded-xl p-4"><div class="text-2xl font-bold text-blue-400" id="stat-eq">—</div><div class="text-xs text-gray-500 mt-1">อุปกรณ์</div></div>
      <div class="bg-white/5 rounded-xl p-4"><div class="text-2xl font-bold text-green-400" id="stat-avail">—</div><div class="text-xs text-gray-500 mt-1">พร้อมให้ยืม</div></div>
      <div class="bg-white/5 rounded-xl p-4"><div class="text-2xl font-bold text-yellow-400" id="stat-active">—</div><div class="text-xs text-gray-500 mt-1">กำลังยืม</div></div>
    </div>
  </div>
</div>

<!-- Right panel -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-8">
  <div class="w-full max-w-md">

    <!-- STEP 1: Employee ID -->
    <div id="step-empid">
      <div class="mb-8">
        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mb-4 lg:hidden">
          <span class="text-white font-bold text-sm">IT</span>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">เข้าสู่ระบบ</h2>
        <p class="text-gray-500 mt-1 text-sm">กรอกรหัสพนักงานเพื่อเริ่มต้น</p>
      </div>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">รหัสพนักงาน</label>
          <input id="inp-empid" type="text" inputmode="numeric" placeholder="เช่น 511401"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            onkeydown="if(event.key==='Enter')checkEmpId()">
        </div>
        <div id="err-empid" class="hidden bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-200"></div>
        <button onclick="checkEmpId()" id="btn-empid"
          class="w-full btn-primary text-white py-3 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2">
          ถัดไป
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <!-- STEP 2a: Enter PIN -->
    <div id="step-pin" class="hidden">
      <button onclick="backToEmpId()" class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        ย้อนกลับ
      </button>
      <div class="mb-8">
        <div id="pin-avatar" class="w-14 h-14 rounded-full bg-blue-500 flex items-center justify-center text-white text-xl font-bold mb-4"></div>
        <h2 class="text-2xl font-bold text-gray-900">กรอก PIN</h2>
        <p class="text-gray-500 mt-1 text-sm">กรอก PIN 6 หลักของคุณ</p>
      </div>
      <div class="flex gap-3 justify-center mb-6" id="pin-boxes">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
      </div>
      <div id="err-pin" class="hidden bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-200 mb-4"></div>
      <button onclick="submitPin()" id="btn-pin"
        class="w-full btn-primary text-white py-3 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2">
        เข้าสู่ระบบ
      </button>
    </div>

    <!-- STEP 2b: Set PIN (first time) -->
    <div id="step-setpin" class="hidden">
      <button onclick="backToEmpId()" class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        ย้อนกลับ
      </button>
      <div class="mb-6">
        <div class="inline-flex items-center gap-2 bg-blue-50 text-blue-700 text-xs font-semibold px-3 py-1.5 rounded-full mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          เข้าใช้งานครั้งแรก
        </div>
        <h2 class="text-2xl font-bold text-gray-900">ตั้ง PIN ของคุณ</h2>
        <p class="text-gray-500 mt-1 text-sm">กรุณาตั้ง PIN 6 หลักสำหรับการเข้าใช้งานครั้งต่อไป</p>
      </div>

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2.5">PIN ใหม่</label>
        <div class="flex gap-3 justify-center" id="newpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        </div>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2.5">ยืนยัน PIN</label>
        <div class="flex gap-3 justify-center" id="confirmpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        </div>
      </div>
      <div id="err-setpin" class="hidden bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-200 mb-4"></div>
      <button onclick="submitSetPin()" id="btn-setpin"
        class="w-full btn-primary text-white py-3 rounded-xl font-semibold text-sm transition">
        ยืนยันและเข้าสู่ระบบ
      </button>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script>
var CURRENT_EMP = null;

// ── PIN boxes helper ──────────────────────────────────────────
function initPinBoxes(containerId, onComplete) {
  var boxes = document.querySelectorAll('#' + containerId + ' .pin-box');
  boxes.forEach(function(box, i) {
    box.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(-1);
      if (this.value && i < boxes.length - 1) boxes[i + 1].focus();
      if (i === boxes.length - 1 && getPinValue(containerId).length === 6 && onComplete) onComplete();
    });
    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) boxes[i - 1].focus();
    });
    box.addEventListener('paste', function(e) {
      e.preventDefault();
      var text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      text.split('').forEach(function(ch, j) { if (boxes[j]) boxes[j].value = ch; });
      if (boxes[text.length - 1]) boxes[Math.min(text.length, 5)].focus();
    });
  });
}

function getPinValue(containerId) {
  var boxes = document.querySelectorAll('#' + containerId + ' .pin-box');
  return Array.from(boxes).map(function(b) { return b.value; }).join('');
}
function clearPinBoxes(containerId) {
  document.querySelectorAll('#' + containerId + ' .pin-box').forEach(function(b) { b.value = ''; });
  var first = document.querySelector('#' + containerId + ' .pin-box');
  if (first) first.focus();
}
function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg; el.classList.remove('hidden');
}
function hideErr(id) { document.getElementById(id).classList.add('hidden'); }

function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  if (loading) { btn.disabled = true; btn.innerHTML = '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>'; }
  else { btn.disabled = false; }
}

// ── Step 1: Check Employee ID ─────────────────────────────────
function checkEmpId() {
  var id = document.getElementById('inp-empid').value.trim();
  if (!id) { showErr('err-empid', 'กรุณากรอกรหัสพนักงาน'); return; }
  hideErr('err-empid');
  setLoading('btn-empid', true);

  api({ action: 'getEmployee', empId: id })
    .then(function(data) {
      setLoading('btn-empid', false);
      if (!data.found) {
        document.getElementById('btn-empid').textContent = 'ถัดไป →';
        showErr('err-empid', data.reason || 'ไม่พบรหัสพนักงาน');
        return;
      }
      CURRENT_EMP = data;
      if (data.hasPin) {
        showPinStep();
      } else {
        showSetPinStep();
      }
    })
    .catch(function() {
      setLoading('btn-empid', false);
      document.getElementById('btn-empid').innerHTML = 'ถัดไป <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
      showErr('err-empid', 'ไม่สามารถเชื่อมต่อ API ได้ กรุณาลองใหม่');
    });
}

function backToEmpId() {
  document.getElementById('step-pin').classList.add('hidden');
  document.getElementById('step-setpin').classList.add('hidden');
  document.getElementById('step-empid').classList.remove('hidden');
  document.getElementById('btn-empid').innerHTML = 'ถัดไป <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>';
}

// ── Step 2a: Enter existing PIN ───────────────────────────────
function showPinStep() {
  document.getElementById('step-empid').classList.add('hidden');
  document.getElementById('step-pin').classList.remove('hidden');
  var avatar = document.getElementById('pin-avatar');
  if (CURRENT_EMP.avatarUrl) {
    avatar.innerHTML = '<img src="'+CURRENT_EMP.avatarUrl+'" class="w-full h-full rounded-full object-cover">';
  } else {
    avatar.textContent = CURRENT_EMP.firstName ? CURRENT_EMP.firstName.charAt(0) : '?';
  }
  clearPinBoxes('pin-boxes');
  hideErr('err-pin');
  initPinBoxes('pin-boxes', submitPin);
  setTimeout(function() { document.querySelector('#pin-boxes .pin-box').focus(); }, 100);
}

function submitPin() {
  var pin = getPinValue('pin-boxes');
  if (pin.length !== 6) { showErr('err-pin', 'กรุณากรอก PIN ให้ครบ 6 หลัก'); return; }
  hideErr('err-pin');
  setLoading('btn-pin', true);

  api({ action: 'verifyPin', empId: CURRENT_EMP.empId, pin: pin })
    .then(function(data) {
      if (data.ok) {
        sessionStorage.setItem('itb_user', JSON.stringify(data));
        window.location.href = 'index.html';
      } else {
        setLoading('btn-pin', false);
        document.getElementById('btn-pin').textContent = 'เข้าสู่ระบบ';
        clearPinBoxes('pin-boxes');
        showErr('err-pin', data.error || 'PIN ไม่ถูกต้อง');
      }
    })
    .catch(function() {
      setLoading('btn-pin', false);
      document.getElementById('btn-pin').textContent = 'เข้าสู่ระบบ';
      showErr('err-pin', 'เชื่อมต่อไม่ได้ กรุณาลองใหม่');
    });
}

// ── Step 2b: Set PIN (first time) ─────────────────────────────
function showSetPinStep() {
  document.getElementById('step-empid').classList.add('hidden');
  document.getElementById('step-setpin').classList.remove('hidden');
  clearPinBoxes('newpin-boxes');
  clearPinBoxes('confirmpin-boxes');
  hideErr('err-setpin');
  initPinBoxes('newpin-boxes', function() {
    setTimeout(function() { document.querySelector('#confirmpin-boxes .pin-box').focus(); }, 50);
  });
  initPinBoxes('confirmpin-boxes', submitSetPin);
  setTimeout(function() { document.querySelector('#newpin-boxes .pin-box').focus(); }, 100);
}

function submitSetPin() {
  var pin1 = getPinValue('newpin-boxes');
  var pin2 = getPinValue('confirmpin-boxes');
  if (pin1.length !== 6) { showErr('err-setpin', 'กรุณากรอก PIN ให้ครบ 6 หลัก'); return; }
  if (pin1 !== pin2) {
    showErr('err-setpin', 'PIN ไม่ตรงกัน กรุณากรอกใหม่');
    clearPinBoxes('confirmpin-boxes');
    return;
  }
  hideErr('err-setpin');
  setLoading('btn-setpin', true);

  api({ action: 'setPin', empId: CURRENT_EMP.empId, pin: pin1 })
    .then(function(data) {
      if (data.ok) {
        // PIN set — now do verifyPin to get full user object and login
        return api({ action: 'verifyPin', empId: CURRENT_EMP.empId, pin: pin1 });
      } else {
        throw new Error(data.error || 'ไม่สามารถตั้ง PIN ได้');
      }
    })
    .then(function(data) {
      if (data.ok) {
        sessionStorage.setItem('itb_user', JSON.stringify(data));
        window.location.href = 'index.html';
      } else {
        throw new Error(data.error || 'เกิดข้อผิดพลาด');
      }
    })
    .catch(function(err) {
      setLoading('btn-setpin', false);
      document.getElementById('btn-setpin').textContent = 'ยืนยันและเข้าสู่ระบบ';
      showErr('err-setpin', err.message || 'เกิดข้อผิดพลาด');
    });
}

// ── Init ──────────────────────────────────────────────────────
if (sessionStorage.getItem('itb_user')) {
  window.location.href = 'index.html';
}
document.getElementById('inp-empid').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkEmpId();
});
</script>
</body>
</html>
