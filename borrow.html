<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ยืมอุปกรณ์ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
    z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(8px);
  }
  #lightbox.open { display: flex; }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1">
    <div class="flex items-center justify-between mb-8 animate-fade-in">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">ยืมอุปกรณ์</h1>
        <p class="text-sm font-medium text-slate-500 mt-1">ค้นหาและเลือกอุปกรณ์ไอทีที่ต้องการทำรายการยืม</p>
      </div>
      <button onclick="openCart()" class="relative flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white px-5 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-brand-600/25 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 01-8 0"></path></svg>
        <span>ตะกร้า</span>
        <span id="cart-badge" class="bg-white text-brand-600 font-extrabold text-xs rounded-lg px-2 py-0.5 flex items-center justify-center">0</span>
      </button>
    </div>

    <!-- Search & Filter -->
    <div class="bg-white rounded-3xl border border-slate-100 p-4.5 mb-6 shadow-sm shadow-slate-100/50 flex gap-3 items-center animate-fade-in">
      <div class="w-5 h-5 text-slate-400 ml-1">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <input id="search-eq" type="text" placeholder="ค้นหาตามชื่ออุปกรณ์ หรือหมวดหมู่..." onkeyup="filterEq()" class="w-full bg-transparent border-0 text-sm font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-0">
    </div>

    <div id="eq-grid" class="animate-fade-in">
      <div class="flex items-center justify-center py-20 text-slate-400">
        <svg class="animate-spin w-6 h-6 mr-2 text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
        <span class="font-medium text-sm">กำลังโหลดอุปกรณ์...</span>
      </div>
    </div>
  </main>
</div>

<!-- Cart Modal -->
<div id="modal-cart" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-xl p-6.5 md:p-8 shadow-2xl border border-slate-100 max-h-[90vh] overflow-y-auto animate-fade-in">
    <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
      <h3 class="font-bold text-slate-900 text-lg tracking-tight">ตะกร้ายืมอุปกรณ์</h3>
      <button onclick="document.getElementById('modal-cart').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-50 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    
    <div id="cart-items" class="mb-6"></div>
    
    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">วัตถุประสงค์การยืม *</label>
        <input id="borrow-purpose" type="text" placeholder="ระบุเหตุผล เช่น ติดตั้งเครื่องให้พนักงานใหม่ แผนก IT" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">วันที่คาดว่าจะคืนอุปกรณ์ *</label>
        <input id="borrow-retdate" type="date" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold text-slate-800">
      </div>
    </div>
    
    <div id="err-cart" class="hidden bg-rose-50 text-rose-600 text-xs px-4 py-3.5 rounded-2xl border border-rose-100 mb-6 font-semibold leading-relaxed"></div>
    
    <div class="flex gap-4">
      <button onclick="document.getElementById('modal-cart').classList.add('hidden')" class="flex-1 border border-slate-200 text-slate-700 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 hover:border-slate-300 transition">ยกเลิก</button>
      <button onclick="submitBorrow()" id="btn-submit-borrow" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white py-3 rounded-2xl text-sm font-bold shadow-lg shadow-brand-600/25 transition">ส่งคำขอยืม</button>
    </div>
  </div>
</div>

<!-- Lightbox / Photo Viewer -->
<div id="lightbox">
  <button onclick="closeLb()" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 p-3 rounded-2xl border border-white/5 transition z-50 text-xl font-bold">✕</button>
  <button onclick="lbNav(-1)" class="absolute left-6 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 w-14 h-14 rounded-2xl flex items-center justify-center border border-white/5 transition text-3xl font-light">‹</button>
  <img id="lb-img" src="" class="max-w-[85vw] max-h-[80vh] rounded-3xl object-contain shadow-2xl border border-white/10 animate-fade-in">
  <button onclick="lbNav(1)" class="absolute right-6 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 w-14 h-14 rounded-2xl flex items-center justify-center border border-white/5 transition text-3xl font-light">›</button>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAuth();
if (ME) {
  if (ME.role === 'admin') { window.location.href = 'index.html'; }
  renderLayout('borrow');

  var ALL_EQ = [], CART = [];
  var LB_IMGS = [], LB_IDX = 0;

  loadEq();

  function loadEq() {
    api({ action: 'getEquipment' }).then(function(data) {
      ALL_EQ = data.items || [];
      renderGrid(ALL_EQ);
    });
  }

  function filterEq() {
    var q = document.getElementById('search-eq').value.toLowerCase();
    renderGrid(ALL_EQ.filter(function(e){ return (e.name||'').toLowerCase().includes(q)||(e.category||'').toLowerCase().includes(q); }));
  }

  function renderGrid(items) {
    var el = document.getElementById('eq-grid');
    if (!items.length) { el.innerHTML = '<div class="bg-white rounded-3xl border border-slate-100 text-center py-20 text-slate-400 text-sm font-semibold shadow-sm shadow-slate-100/50">ไม่พบรายการอุปกรณ์ในระบบ</div>'; return; }
    
    el.innerHTML = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">'
      + items.map(function(eq) {
        var inCart = CART.find(function(c){ return c.itemId === eq.itemId; });
        var thumb = eq.images && eq.images[0]
          ? '<div class="relative w-full h-44 overflow-hidden rounded-2xl mb-4 group cursor-pointer" onclick=\'openLb('+JSON.stringify(eq.images)+',0)\'>'
            + '<img src="'+eq.images[0]+'" class="w-full h-full object-cover transition duration-500 group-hover:scale-105">'
            + '<div class="absolute inset-0 bg-slate-950/20 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center"><span class="bg-slate-950/60 backdrop-blur-md text-white text-xs font-bold px-3.5 py-2 rounded-xl border border-white/10">🔍 ดูรูปภาพทั้งหมด</span></div></div>'
          : '<div class="w-full h-44 bg-slate-100 rounded-2xl mb-4 flex flex-col items-center justify-center text-slate-400 border border-slate-200/50">'
            + '<svg class="w-8 h-8 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>'
            + '<span class="text-xs font-bold tracking-wide mt-2">ไม่มีรูปภาพอุปกรณ์</span></div>';
        
        var avail = eq.availStock > 0;
        var badgeCls = avail ? 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/10' : 'bg-rose-50 text-rose-700 ring-1 ring-rose-600/10';
        var badgeLabel = avail ? 'พร้อมให้ยืม · คลัง: ' + eq.availStock : 'หมดสต็อก';
        
        var actionBtn = '';
        if (avail) {
          if (inCart) {
            actionBtn = '<button onclick="removeFromCart(\''+eq.itemId+'\')" class="w-full border-2 border-brand-600 text-brand-600 py-2.5 rounded-2xl text-xs font-extrabold bg-brand-50/50 hover:bg-brand-50 transition">✓ อยู่ในตะกร้าแล้ว</button>';
          } else {
            actionBtn = '<button onclick=\'addToCart('+JSON.stringify(eq)+')\' class="w-full bg-brand-600 hover:bg-brand-700 text-white py-2.5 rounded-2xl text-xs font-extrabold shadow-md shadow-brand-600/15 hover:shadow-lg hover:shadow-brand-600/25 transition">+ เพิ่มลงตะกร้า</button>';
          }
        } else {
          actionBtn = '<button disabled class="w-full bg-slate-100 text-slate-400 py-2.5 rounded-2xl text-xs font-extrabold cursor-not-allowed border border-slate-200/50">ไม่สามารถยืมได้</button>';
        }

        return '<div class="bg-white rounded-3xl border border-slate-100 p-5 shadow-sm shadow-slate-100/50 flex flex-col justify-between h-full">'
          + '<div>'
          + thumb
          + '<div class="flex items-start justify-between gap-2.5 mb-1.5">'
          + '<p class="font-extrabold text-slate-800 text-sm leading-tight leading-snug truncate">'+eq.name+'</p>'
          + '</div>'
          + '<div class="flex items-center gap-2 mb-3.5">'
          + '<span class="px-2 py-0.5 rounded-lg text-[10px] font-bold tracking-wide uppercase ' + badgeCls + '">'+badgeLabel+'</span>'
          + '<span class="text-[10px] font-bold text-slate-400 bg-slate-50 border border-slate-200/50 px-2 py-0.5 rounded-lg">'+ (eq.category || 'ทั่วไป') +'</span>'
          + '</div>'
          + (eq.specs ? '<p class="text-xs text-slate-500 font-medium line-clamp-2 leading-relaxed mb-4">' + eq.specs + '</p>' : '<p class="text-xs text-slate-400 font-medium italic mb-4">ไม่มีรายละเอียดข้อมูลจำเพาะ</p>')
          + '</div>'
          + '<div>'
          + '<div class="text-[11px] font-semibold text-slate-400 mb-3 flex items-center justify-between border-t border-slate-50 pt-3"><span>รหัสทรัพย์สิน:</span><span class="font-bold text-slate-600">'+(eq.assetCode || '—')+'</span></div>'
          + actionBtn
          + '</div>'
          + '</div>';
      }).join('') + '</div>';
  }

  function addToCart(eq) {
    if (!CART.find(function(c){ return c.itemId===eq.itemId; })) {
      CART.push({ itemId:eq.itemId, itemName:eq.name, qty:1, avail:eq.availStock });
    }
    updateCartBadge();
    renderGrid(ALL_EQ);
    showToast('เพิ่มลงตะกร้าเรียบร้อยแล้ว', 'ok');
  }
  
  function removeFromCart(id) {
    CART = CART.filter(function(c){ return c.itemId !== id; });
    updateCartBadge();
    renderGrid(ALL_EQ);
  }
  
  function updateCartBadge() { document.getElementById('cart-badge').textContent = CART.length; }

  function openCart() {
    var el = document.getElementById('cart-items');
    if (!CART.length) { 
      el.innerHTML = '<div class="text-center py-10 text-slate-400 flex flex-col items-center justify-center">'
        + '<svg class="w-10 h-10 opacity-50 mb-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>'
        + '<span class="text-xs font-bold">ไม่มีรายการสินค้าในตะกร้า</span></div>'; 
    } else {
      el.innerHTML = '<div class="space-y-3 mb-6">'
        + CART.map(function(c) {
          return '<div class="flex items-center justify-between bg-slate-50 border border-slate-100 rounded-2xl px-4.5 py-4">'
            + '<div class="min-w-0 pr-3"><p class="text-sm font-bold text-slate-800 truncate">'+c.itemName+'</p>'
            + '<p class="text-[10px] font-bold text-slate-400 mt-0.5">ในคลังพร้อมยืม: ' + c.avail + ' ชิ้น</p></div>'
            + '<div class="flex items-center gap-3.5 flex-shrink-0">'
            + '<div class="flex items-center gap-2 bg-white border border-slate-200/80 rounded-xl p-1 shadow-sm">'
            + '<button onclick="changeQty(\''+c.itemId+'\',-1)" class="w-7 h-7 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold flex items-center justify-center transition">−</button>'
            + '<span class="w-7 text-center text-xs font-bold text-slate-800" id="qty-'+c.itemId+'">'+c.qty+'</span>'
            + '<button onclick="changeQty(\''+c.itemId+'\',1)" class="w-7 h-7 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold flex items-center justify-center transition">+</button>'
            + '</div>'
            + '<button onclick="removeFromCart(\''+c.itemId+'\');openCart()" class="text-rose-400 hover:text-rose-600 hover:bg-rose-50 p-2 rounded-xl transition"><svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path></svg></button>'
            + '</div></div>';
        }).join('') + '</div>';
    }
    document.getElementById('err-cart').classList.add('hidden');
    document.getElementById('modal-cart').classList.remove('hidden');
  }

  function changeQty(id, delta) {
    var item = CART.find(function(c){ return c.itemId===id; });
    if (!item) return;
    item.qty = Math.max(1, Math.min(item.avail, item.qty + delta));
    var el = document.getElementById('qty-'+id);
    if (el) el.textContent = item.qty;
  }

  function submitBorrow() {
    if (!CART.length) { showCartErr('กรุณาเลือกอุปกรณ์ที่จะยืมในตะกร้าก่อนส่งคำขอ'); return; }
    var purpose = document.getElementById('borrow-purpose').value.trim();
    var retDate = document.getElementById('borrow-retdate').value;
    if (!purpose) { showCartErr('กรุณาระบุวัตถุประสงค์การยืมอุปกรณ์'); return; }
    if (!retDate) { showCartErr('กรุณาระบุวันที่คาดว่าจะส่งคืนอุปกรณ์'); return; }

    var btn = document.getElementById('btn-submit-borrow');
    btn.disabled = true; btn.textContent = 'กำลังทำรายการ...';

    api({ action:'createRequest', empId:ME.empId, purpose:purpose,
          returnDateProposed:retDate, items:JSON.stringify(CART.map(function(c){ return {itemId:c.itemId,itemName:c.itemName,qty:c.qty}; })) })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        CART = [];
        updateCartBadge();
        document.getElementById('modal-cart').classList.add('hidden');
        renderGrid(ALL_EQ);
        showToast('ส่งคำขอเรียบร้อยแล้ว รอผู้ดูแลระบบอนุมัติคำขอยืม', 'ok');
      }).catch(function(err) {
        showCartErr(err.message);
      }).finally(function() {
        btn.disabled = false; btn.textContent = 'ส่งคำขอยืม';
      });
  }
  
  function showCartErr(msg) { var el = document.getElementById('err-cart'); el.textContent=msg; el.classList.remove('hidden'); }

  // Lightbox Viewer
  function openLb(imgs, idx) { 
    LB_IMGS = imgs; LB_IDX = idx; 
    document.getElementById('lb-img').src=LB_IMGS[LB_IDX]; 
    document.getElementById('lightbox').classList.add('open'); 
  }
  function closeLb() { document.getElementById('lightbox').classList.remove('open'); }
  function lbNav(d) { 
    LB_IDX = (LB_IDX + d + LB_IMGS.length) % LB_IMGS.length; 
    document.getElementById('lb-img').src = LB_IMGS[LB_IDX]; 
  }
  document.addEventListener('keydown', function(e){ 
    if(e.key==='Escape')closeLb(); 
    if(e.key==='ArrowLeft')lbNav(-1); 
    if(e.key==='ArrowRight')lbNav(1); 
  });
}
</script>
</body>
</html>
