<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ติดตาม — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1">
    <div class="flex items-center justify-between mb-8 animate-fade-in">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">ติดตามการยืม</h1>
        <p class="text-sm font-medium text-slate-500 mt-1">รายการอุปกรณ์ไอทีที่กำลังถูกยืมอยู่ทั้งหมดในปัจจุบัน</p>
      </div>
      <button onclick="loadData()" class="flex items-center gap-2 border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 px-4.5 py-2.5 rounded-2xl text-xs font-bold shadow-sm hover:border-slate-300 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.64"></path></svg>
        <span>รีเฟรช</span>
      </button>
    </div>

    <!-- Legend indicators -->
    <div class="bg-white rounded-3xl border border-slate-100 p-5 mb-6 shadow-sm shadow-slate-100/50 flex gap-4 flex-wrap items-center animate-fade-in">
      <span class="text-[10px] uppercase font-extrabold text-slate-400 tracking-wider">ดัชนีสถานะ:</span>
      <span class="flex items-center gap-2 text-xs font-semibold text-slate-600"><span class="w-2.5 h-2.5 rounded-full bg-rose-500 inline-block shadow-sm"></span>เกินกำหนดส่งคืน</span>
      <span class="flex items-center gap-2 text-xs font-semibold text-slate-600"><span class="w-2.5 h-2.5 rounded-full bg-amber-400 inline-block shadow-sm"></span>ใกล้ครบกำหนด (≤ 3 วัน)</span>
      <span class="flex items-center gap-2 text-xs font-semibold text-slate-600"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 inline-block shadow-sm"></span>สถานะปกติ</span>
    </div>

    <div id="track-list" class="animate-fade-in">
      <div class="flex items-center justify-center py-20 text-slate-400">
        <svg class="animate-spin w-6 h-6 mr-2 text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
        <span class="font-medium text-sm">กำลังโหลดข้อมูลติดตาม...</span>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAdmin();
if (ME) {
  renderLayout('tracking');
  loadData();

  function loadData() {
    document.getElementById('track-list').innerHTML = loadingHtml();
    api({ action: 'getTracking' }).then(function(data) {
      var items = data.items || [];
      var el = document.getElementById('track-list');
      if (!items.length) {
        el.innerHTML = '<div class="bg-white rounded-3xl border border-slate-100 text-center py-20 text-slate-400 text-sm font-semibold shadow-sm shadow-slate-100/50">ไม่มีรายการที่ค้างส่งยืมในขณะนี้ 🎉</div>';
        return;
      }

      // Sort: overdue first, then warning, then ok
      var order = { overdue:0, warning:1, ok:2, unknown:3 };
      items.sort(function(a,b){ return (order[a.urgency]||3) - (order[b.urgency]||3); });

      var urgencyConfig = {
        overdue: { dot:'bg-rose-500 shadow-rose-500/20', badge:'bg-rose-50 text-rose-700 ring-1 ring-rose-600/10', label:'เกินกำหนด' },
        warning: { dot:'bg-amber-400 shadow-amber-400/20', badge:'bg-amber-50 text-amber-700 ring-1 ring-amber-600/10', label:'ใกล้ครบกำหนด' },
        ok:      { dot:'bg-emerald-500 shadow-emerald-500/20', badge:'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/10', label:'ปกติ' },
        unknown: { dot:'bg-slate-400 shadow-slate-400/20',  badge:'bg-slate-50 text-slate-600 ring-1 ring-slate-600/10',   label:'ไม่ระบุ' }
      };

      var statusMap = { active:'กำลังยืม', pending_return:'รอคืน' };

      el.innerHTML = '<div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm shadow-slate-100/50"><div class="overflow-x-auto"><table class="w-full text-sm">'
        + '<thead><tr class="bg-slate-50/50 border-b border-slate-100 text-slate-500 uppercase tracking-wider font-extrabold text-[10px]">'
        + '<th class="text-left px-6 py-4.5 font-bold">พนักงานผู้ยืม</th>'
        + '<th class="text-left px-6 py-4.5 font-bold">แผนก / สังกัด</th>'
        + '<th class="text-left px-6 py-4.5 font-bold">สถานะคำขอ</th>'
        + '<th class="text-left px-6 py-4.5 font-bold">กำหนดวันส่งคืน</th>'
        + '<th class="text-center px-6 py-4.5 font-bold">ระยะเวลาการยืม</th>'
        + '</tr></thead><tbody class="divide-y divide-slate-100">'
        + items.map(function(r) {
          var cfg = urgencyConfig[r.urgency] || urgencyConfig.unknown;
          var daysLabel = r.daysLeft == null ? '—'
            : r.daysLeft < 0 ? 'เกินกำหนด ' + Math.abs(r.daysLeft) + ' วัน'
            : r.daysLeft === 0 ? 'ครบกำหนดวันนี้!'
            : 'เหลือ ' + r.daysLeft + ' วัน';
          
          return '<tr class="hover:bg-slate-50/30 transition duration-150">'
            + '<td class="px-6 py-4.5"><div class="flex items-center gap-3"><span class="w-2.5 h-2.5 rounded-full '+cfg.dot+' flex-shrink-0"></span><div><p class="font-extrabold text-slate-800">'+r.empName+'</p><p class="text-[10px] font-bold text-slate-400 mt-0.5">'+r.empId+'</p></div></div></td>'
            + '<td class="px-6 py-4.5 text-slate-600 font-semibold">'+(r.dept||'—')+'</td>'
            + '<td class="px-6 py-4.5"><span class="px-2.5 py-1 bg-brand-50 text-brand-700 rounded-full text-[11px] font-bold ring-1 ring-brand-600/10">'+(statusMap[r.status]||r.status)+'</span></td>'
            + '<td class="px-6 py-4.5 text-slate-600 font-semibold">'+(r.returnDate||'—')+'</td>'
            + '<td class="px-6 py-4.5 text-center"><span class="px-2.5 py-1.5 rounded-xl text-xs font-bold '+cfg.badge+'">'+daysLabel+'</span></td>'
            + '</tr>';
        }).join('')
        + '</tbody></table></div></div>';
    });
  }
}
</script>
</body>
</html>
