<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>คำขอของฉัน — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1">
    <div class="mb-8 animate-fade-in">
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">คำขอของฉัน</h1>
      <p class="text-sm font-medium text-slate-500 mt-1">ประวัติการทำรายการยืม-คืนอุปกรณ์ไอทีทั้งหมดของคุณ</p>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-6 flex-wrap animate-fade-in">
      <button onclick="setTab('all')" id="tab-all" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-brand-600 text-white shadow-md shadow-brand-600/15">ทั้งหมด</button>
      <button onclick="setTab('pending')" id="tab-pending" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">รออนุมัติ</button>
      <button onclick="setTab('active')" id="tab-active" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">กำลังยืม</button>
      <button onclick="setTab('returned')" id="tab-returned" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">คืนแล้ว</button>
    </div>

    <div id="req-list" class="animate-fade-in">
      <div class="flex items-center justify-center py-20 text-slate-400">
        <svg class="animate-spin w-6 h-6 mr-2 text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
        <span class="font-medium text-sm">กำลังโหลดประวัติ...</span>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAuth();
if (ME) {
  if (ME.role === 'admin') { window.location.href = 'approve.html'; }
  renderLayout('myrequests');

  var ALL = [], CUR_TAB = 'all';
  loadRequests();

  function loadRequests() {
    api({ action: 'getMyRequests', empId: ME.empId }).then(function(data) {
      ALL = data.requests || [];
      renderList();
    });
  }

  function setTab(tab) {
    CUR_TAB = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.className = 'tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300';
    });
    document.getElementById('tab-' + tab).className = 'tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-brand-600 text-white shadow-md shadow-brand-600/15';
    renderList();
  }

  function renderList() {
    var items = CUR_TAB === 'all' ? ALL : ALL.filter(function(r){ return r.status === CUR_TAB || (CUR_TAB === 'active' && r.status === 'pending_return'); });
    var el = document.getElementById('req-list');
    if (!items.length) { el.innerHTML = '<div class="bg-white rounded-3xl border border-slate-100 text-center py-20 text-sm font-semibold text-slate-400 shadow-sm shadow-slate-100/50">ไม่มีรายการประวัติคำขอ</div>'; return; }

    var statusMap = { pending:'รออนุมัติ', active:'กำลังยืม', pending_return:'รอยืนยันคืน', returned:'คืนแล้ว', rejected:'ปฏิเสธ', approved:'อนุมัติ' };
    var colorMap = { pending:'bg-amber-50 text-amber-700 ring-1 ring-amber-600/10', active:'bg-brand-50 text-brand-700 ring-1 ring-brand-600/10', pending_return:'bg-purple-50 text-purple-700 ring-1 ring-purple-600/10', returned:'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/10', rejected:'bg-rose-50 text-rose-700 ring-1 ring-rose-600/10' };

    el.innerHTML = '<div class="space-y-4">' + items.map(function(r) {
      var cls = colorMap[r.status] || 'bg-slate-50 text-slate-600';
      var canReturn = r.status === 'active';
      
      // Render requested items list
      var itemsHtml = '';
      if (r.items && r.items.length > 0) {
        itemsHtml = '<div class="bg-slate-50 rounded-2xl p-4.5 mb-4 border border-slate-100/60">'
          + '<p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2.5">อุปกรณ์ที่ขอยืม</p>'
          + '<div class="space-y-2">'
          + r.items.map(function(it) {
            return '<div class="flex items-center justify-between text-xs font-semibold text-slate-700">'
              + '<span class="truncate pr-3 flex items-center gap-2"><svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="4" ry="4"/></svg>' + it.itemName + '</span>'
              + '<span class="bg-white border border-slate-200 px-2 py-0.5 rounded text-slate-600 font-bold">x' + it.qty + '</span>'
              + '</div>';
          }).join('')
          + '</div></div>';
      }

      var actionBtn = '';
      if (canReturn) {
        actionBtn = '<button onclick="requestReturn(\''+r.requestId+'\')" class="px-4 py-2.5 bg-purple-600 hover:bg-purple-700 text-white rounded-xl text-xs font-bold shadow-md shadow-purple-600/15 transition flex items-center gap-1.5">'
          + '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>'
          + '<span>แจ้งคืนอุปกรณ์</span></button>';
      }

      return '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/50 flex flex-col justify-between hover:shadow-md hover:shadow-slate-100/70 transition duration-200">'
        + '<div>'
        + '<div class="flex items-center justify-between gap-3 mb-4 pb-3 border-b border-slate-50">'
        + '<div><p class="font-extrabold text-slate-800 text-sm tracking-wide">' + r.requestId + '</p>'
        + '<p class="text-[11px] font-bold text-slate-400 mt-0.5">' + r.requestedAt + '</p></div>'
        + '<span class="px-2.5 py-1 rounded-full text-[11px] font-bold flex-shrink-0 ' + cls + '">' + (statusMap[r.status]||r.status) + '</span>'
        + '</div>'
        
        + itemsHtml
        
        + '<div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs font-semibold text-slate-500 mb-4">'
        + '<div><span class="text-slate-400">วัตถุประสงค์:</span> <span class="text-slate-700 ml-1">' + (r.purpose||'—') + '</span></div>'
        + '<div><span class="text-slate-400">กำหนดคืน:</span> <span class="text-slate-700 ml-1">' + (r.returnDateFinal || r.returnDateProposed || '—') + '</span></div>'
        + '</div>'
        
        + (r.adminNote ? '<div class="text-xs font-semibold text-slate-600 bg-amber-50/50 border border-amber-100/50 rounded-2xl px-4 py-3 mb-4 flex gap-1.5">💡 <span class="text-amber-800"><strong class="font-bold text-amber-900">หมายเหตุจากผู้ดูแล:</strong> ' + r.adminNote + '</span></div>' : '')
        + '</div>'
        + (actionBtn ? '<div class="flex justify-end border-t border-slate-50 pt-4 mt-2">' + actionBtn + '</div>' : '')
        + '</div>';
    }).join('') + '</div>';
  }

  function requestReturn(reqId) {
    if (!confirm('คุณต้องการยืนยันการแจ้งคืนอุปกรณ์สำหรับคำขอยืมรหัส ' + reqId + ' ใช่หรือไม่?')) return;
    api({ action: 'requestReturn', requestId: reqId, empId: ME.empId })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        showToast('แจ้งคืนเรียบร้อยแล้ว รอผู้ดูแลระบบตรวจสอบการส่งคืน', 'ok');
        loadRequests();
      }).catch(function(err) { showToast(err.message, 'error'); });
  }
}
</script>
</body>
</html>
