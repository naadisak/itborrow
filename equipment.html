<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>จัดการอุปกรณ์ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Sarabun',sans-serif;} .slot-img{width:56px;height:56px;object-fit:cover;border-radius:8px;border:2px solid #e5e7eb;cursor:pointer;transition:.2s;} .slot-img:hover{border-color:#3b82f6;}</style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="layout-wrapper" class="ml-64 pt-16 min-h-screen">
  <main class="p-6">
    <div class="flex items-center justify-between mb-6">
      <div><h1 class="text-xl font-bold text-gray-900">จัดการอุปกรณ์</h1>
      <p class="text-sm text-gray-500 mt-0.5">รายการอุปกรณ์ทั้งหมดในระบบ</p></div>
      <button onclick="openAddModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-semibold transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        เพิ่มอุปกรณ์
      </button>
    </div>

    <!-- Search/filter bar -->
    <div class="bg-white rounded-2xl border border-gray-200 p-4 mb-4 flex gap-3">
      <input id="search-eq" type="text" placeholder="ค้นหาชื่อ หรือรหัสทรัพย์สิน..." onkeyup="filterTable()" class="flex-1 border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div id="eq-table-body">
        <div class="flex items-center justify-center py-16 text-gray-400">
          <svg class="animate-spin w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
          กำลังโหลด...
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Equipment Modal -->
<div id="modal-add" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl">
    <div class="flex items-center justify-between mb-5">
      <h3 class="font-bold text-gray-900 text-lg">เพิ่มอุปกรณ์ใหม่</h3>
      <button onclick="closeModal('modal-add')" class="text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">ชื่อรายการ *</label>
        <input id="add-name" type="text" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">รหัสทรัพย์สิน</label>
        <input id="add-asset" type="text" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
        <input id="add-cat" type="text" placeholder="เช่น Laptop, Monitor" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">จำนวน *</label>
        <input id="add-qty" type="number" min="1" value="1" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">ข้อมูลอุปกรณ์</label>
      <textarea id="add-specs" rows="3" placeholder="รายละเอียดสเปค..." class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea></div>
    </div>
    <div id="err-add" class="hidden mt-3 bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-200"></div>
    <div class="flex gap-3 mt-5">
      <button onclick="closeModal('modal-add')" class="flex-1 border border-gray-300 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition">ยกเลิก</button>
      <button onclick="submitAdd()" id="btn-add" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-semibold transition">เพิ่มอุปกรณ์</button>
    </div>
  </div>
</div>

<!-- Edit Images Modal -->
<div id="modal-imgs" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl">
    <div class="flex items-center justify-between mb-5">
      <h3 class="font-bold text-gray-900 text-lg" id="imgs-title">รูปภาพอุปกรณ์</h3>
      <button onclick="closeModal('modal-imgs')" class="text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div class="flex gap-3 flex-wrap" id="img-slots"></div>
    <p class="text-xs text-gray-400 mt-3">คลิกที่รูปหรือ + เพื่ออัปโหลด (สูงสุด 5 รูป)</p>
    <div class="flex gap-3 mt-5">
      <button onclick="closeModal('modal-imgs')" class="flex-1 border border-gray-300 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition">ยกเลิก</button>
      <button onclick="saveEqImages()" id="btn-save-imgs" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl text-sm font-semibold transition">บันทึก</button>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-opacity pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAdmin();
if (ME) {
  renderLayout('equipment');
  var ALL_EQ = [];
  var IMG_EDIT_ID = null;
  var IMG_STATE = ['','','','',''];

  loadEquipment();

  function loadEquipment() {
    api({ action: 'getEquipment' }).then(function(data) {
      ALL_EQ = data.items || [];
      renderTable(ALL_EQ);
    });
  }

  function renderTable(items) {
    var body = document.getElementById('eq-table-body');
    if (!items.length) {
      body.innerHTML = '<div class="text-center py-16 text-gray-400 text-sm">ยังไม่มีอุปกรณ์</div>';
      return;
    }
    body.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm">'
      + '<thead><tr class="bg-gray-50 border-b border-gray-200">'
      + '<th class="text-left px-5 py-3.5 font-semibold text-gray-600">รายการ</th>'
      + '<th class="text-left px-5 py-3.5 font-semibold text-gray-600">รหัสทรัพย์สิน</th>'
      + '<th class="text-left px-5 py-3.5 font-semibold text-gray-600">หมวดหมู่</th>'
      + '<th class="text-center px-5 py-3.5 font-semibold text-gray-600">สต็อก</th>'
      + '<th class="text-center px-5 py-3.5 font-semibold text-gray-600">พร้อมให้ยืม</th>'
      + '<th class="px-5 py-3.5"></th>'
      + '</tr></thead><tbody>'
      + items.map(function(eq) {
        var thumb = eq.images && eq.images[0]
          ? '<img src="'+eq.images[0]+'" class="w-10 h-10 rounded-lg object-cover border border-gray-200">'
          : '<div class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center text-gray-400 text-xs">—</div>';
        var avail = eq.availStock > 0
          ? '<span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-full font-semibold">'+eq.availStock+'</span>'
          : '<span class="px-2.5 py-1 bg-red-100 text-red-700 rounded-full font-semibold">'+eq.availStock+'</span>';
        return '<tr class="border-b border-gray-100 hover:bg-gray-50 transition">'
          + '<td class="px-5 py-4"><div class="flex items-center gap-3">'+thumb+'<div><p class="font-medium text-gray-900">'+eq.name+'</p><p class="text-xs text-gray-400">'+eq.itemId+'</p></div></div></td>'
          + '<td class="px-5 py-4 text-gray-600">'+(eq.assetCode||'—')+'</td>'
          + '<td class="px-5 py-4"><span class="px-2.5 py-1 bg-blue-50 text-blue-700 rounded-full text-xs font-medium">'+(eq.category||'ทั่วไป')+'</span></td>'
          + '<td class="px-5 py-4 text-center font-medium text-gray-800">'+eq.totalStock+'</td>'
          + '<td class="px-5 py-4 text-center">'+avail+'</td>'
          + '<td class="px-5 py-4 text-right">'
          + '<button onclick=\'openImgModal('+JSON.stringify(eq)+')\' class="text-blue-600 hover:text-blue-800 text-xs font-medium px-2 py-1 hover:bg-blue-50 rounded-lg transition mr-1">🖼️ รูป</button>'
          + '</td></tr>';
      }).join('')
      + '</tbody></table></div>';
  }

  function filterTable() {
    var q = document.getElementById('search-eq').value.toLowerCase();
    var filtered = ALL_EQ.filter(function(e) {
      return (e.name||'').toLowerCase().includes(q) || (e.assetCode||'').toLowerCase().includes(q) || (e.category||'').toLowerCase().includes(q);
    });
    renderTable(filtered);
  }

  function openAddModal() {
    ['add-name','add-asset','add-cat','add-specs'].forEach(function(id){ document.getElementById(id).value=''; });
    document.getElementById('add-qty').value = '1';
    document.getElementById('err-add').classList.add('hidden');
    document.getElementById('btn-add').textContent = 'เพิ่มอุปกรณ์';
    document.getElementById('modal-add').classList.remove('hidden');
    document.getElementById('add-name').focus();
  }

  function submitAdd() {
    var name = document.getElementById('add-name').value.trim();
    var qty  = document.getElementById('add-qty').value;
    if (!name) { showAddErr('กรุณากรอกชื่อรายการ'); return; }
    document.getElementById('btn-add').textContent = 'กำลังบันทึก...';
    document.getElementById('btn-add').disabled = true;
    api({ action:'addEquipment', name:name, assetCode:document.getElementById('add-asset').value.trim(),
          category:document.getElementById('add-cat').value.trim(), totalStock:qty,
          specs:document.getElementById('add-specs').value.trim() })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        closeModal('modal-add');
        showToast('เพิ่มอุปกรณ์เรียบร้อย', 'ok');
        loadEquipment();
      }).catch(function(err) {
        showAddErr(err.message);
        document.getElementById('btn-add').textContent = 'เพิ่มอุปกรณ์';
        document.getElementById('btn-add').disabled = false;
      });
  }
  function showAddErr(msg) { var el = document.getElementById('err-add'); el.textContent=msg; el.classList.remove('hidden'); }

  // ── Image editing ──────────────────────────────────────────
  function openImgModal(eq) {
    IMG_EDIT_ID = eq.itemId;
    IMG_STATE = [eq.images[0]||'', eq.images[1]||'', eq.images[2]||'', eq.images[3]||'', eq.images[4]||''];
    document.getElementById('imgs-title').textContent = 'รูปภาพ — ' + eq.name;
    renderImgSlots();
    document.getElementById('modal-imgs').classList.remove('hidden');
  }

  function renderImgSlots() {
    var slots = document.getElementById('img-slots');
    slots.innerHTML = IMG_STATE.map(function(url, i) {
      if (url) {
        return '<div class="relative"><img src="'+url+'" class="slot-img" onclick="document.getElementById(\'file-'+i+'\').click()">'
          + '<button onclick="removeImg('+i+')" class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600">✕</button>'
          + '<input type="file" id="file-'+i+'" accept="image/*" class="hidden" onchange="uploadEqImg('+i+',this)"></div>';
      }
      return '<label class="w-14 h-14 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center cursor-pointer hover:border-blue-400 text-gray-400 hover:text-blue-500 transition">'
        + '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>'
        + '<input type="file" accept="image/*" class="hidden" onchange="uploadEqImg('+i+',this)"></label>';
    }).join('');
  }

  function removeImg(i) { IMG_STATE[i] = ''; renderImgSlots(); }

  function uploadEqImg(i, input) {
    var file = input.files[0]; if (!file) return;
    showToast('กำลังอัปโหลด...', 'ok');
    uploadToImgBB(file).then(function(url) {
      IMG_STATE[i] = url;
      renderImgSlots();
      showToast('อัปโหลดสำเร็จ', 'ok');
    }).catch(function() { showToast('อัปโหลดไม่ได้', 'error'); });
  }

  function saveEqImages() {
    document.getElementById('btn-save-imgs').textContent = 'กำลังบันทึก...';
    api({ action:'updateEquipmentImages', itemId:IMG_EDIT_ID,
          img1:IMG_STATE[0], img2:IMG_STATE[1], img3:IMG_STATE[2], img4:IMG_STATE[3], img5:IMG_STATE[4] })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        closeModal('modal-imgs');
        showToast('บันทึกรูปภาพเรียบร้อย', 'ok');
        loadEquipment();
      }).catch(function() { showToast('บันทึกไม่ได้', 'error'); });
    document.getElementById('btn-save-imgs').textContent = 'บันทึก';
  }

  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
}
</script>
</body>
</html>
