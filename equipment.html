<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>จัดการอุปกรณ์ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .slot-img {
    width: 68px; height: 68px; object-fit: cover; border-radius: 12px;
    border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.2s;
  }
  .slot-img:hover { border-color: #465fff; transform: scale(1.03); }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1">
    <div class="flex items-center justify-between mb-8 animate-fade-in">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">จัดการอุปกรณ์</h1>
        <p class="text-sm font-medium text-slate-500 mt-1">ตรวจสอบสต็อก เพิ่มข้อมูล และจัดการรูปภาพอุปกรณ์ไอทีทั้งหมด</p>
      </div>
      <button onclick="openAddModal()" class="flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white px-5 py-3 rounded-2xl text-xs font-bold shadow-lg shadow-brand-600/25 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>เพิ่มอุปกรณ์ใหม่</span>
      </button>
    </div>

    <!-- Search/Filter Bar -->
    <div class="bg-white rounded-3xl border border-slate-100 p-4.5 mb-6 shadow-sm shadow-slate-100/50 flex gap-3 items-center animate-fade-in">
      <div class="w-5 h-5 text-slate-400 ml-1">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <input id="search-eq" type="text" placeholder="ค้นหาตามชื่ออุปกรณ์ หรือรหัสทรัพย์สิน..." onkeyup="filterTable()" class="w-full bg-transparent border-0 text-sm font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-0">
    </div>

    <!-- Table -->
    <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm shadow-slate-100/50 animate-fade-in">
      <div id="eq-table-body">
        <div class="flex items-center justify-center py-20 text-slate-400">
          <svg class="animate-spin w-6 h-6 mr-2 text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
          <span class="font-medium text-sm">กำลังโหลดคลังอุปกรณ์...</span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Equipment Modal -->
<div id="modal-add" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-xl p-6.5 md:p-8 shadow-2xl border border-slate-100 max-h-[90vh] overflow-y-auto animate-fade-in">
    <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
      <h3 class="font-bold text-slate-900 text-lg tracking-tight">เพิ่มอุปกรณ์ใหม่</h3>
      <button onclick="closeModal('modal-add')" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-50 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    
    <div class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">ชื่ออุปกรณ์ *</label>
          <input id="add-name" type="text" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">รหัสทรัพย์สิน (Asset Code)</label>
          <input id="add-asset" type="text" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400">
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">หมวดหมู่</label>
          <input id="add-cat" type="text" placeholder="เช่น Laptop, Monitor" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">จำนวนสต็อกอุปกรณ์ *</label>
          <input id="add-qty" type="number" min="1" value="1" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold text-slate-800">
        </div>
      </div>
      <div>
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">รายละเอียดสเปคข้อมูลอุปกรณ์</label>
        <textarea id="add-specs" rows="3" placeholder="ระบุรายละเอียดจำเพาะ เช่น RAM, CPU, หน้าจอ, หรือตำหนิต่างๆ..." class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400 resize-none"></textarea>
      </div>
    </div>
    
    <div id="err-add" class="hidden mt-4 bg-rose-50 text-rose-600 text-xs px-4 py-3 rounded-2xl border border-rose-100 font-semibold leading-relaxed"></div>
    
    <div class="flex gap-4 mt-6.5">
      <button onclick="closeModal('modal-add')" class="flex-1 border border-slate-200 text-slate-700 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 hover:border-slate-300 transition">ยกเลิก</button>
      <button onclick="submitAdd()" id="btn-add" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white py-3 rounded-2xl text-sm font-bold shadow-lg shadow-brand-600/25 transition">เพิ่มอุปกรณ์</button>
    </div>
  </div>
</div>

<!-- Edit Images Modal -->
<div id="modal-imgs" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-xl p-6.5 md:p-8 shadow-2xl border border-slate-100 max-h-[90vh] overflow-y-auto animate-fade-in">
    <div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100">
      <h3 class="font-bold text-slate-900 text-lg tracking-tight" id="imgs-title">รูปภาพอุปกรณ์</h3>
      <button onclick="closeModal('modal-imgs')" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-50 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    
    <div class="flex gap-3.5 flex-wrap justify-center sm:justify-start" id="img-slots"></div>
    <p class="text-[11px] font-bold text-slate-400 mt-4 bg-slate-50 border border-slate-100 p-3 rounded-xl">💡 คลิกที่สล็อตภาพว่าง (+) เพื่อเริ่มอัปโหลดรูปภาพใหม่ หรือคลิกที่รูปภาพเดิมเพื่อเลือกภาพทับ (อัปโหลดสูงสุดได้ 5 รูปภาพ)</p>
    
    <div class="flex gap-4 mt-6.5">
      <button onclick="closeModal('modal-imgs')" class="flex-1 border border-slate-200 text-slate-700 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 hover:border-slate-300 transition">ยกเลิก</button>
      <button onclick="saveEqImages()" id="btn-save-imgs" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white py-3 rounded-2xl text-sm font-bold shadow-lg shadow-brand-600/25 transition">บันทึกรูปภาพ</button>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAdmin();
if (ME) {
  renderLayout('equipment');
  var ALL_EQ = [];
  var IMG_EDIT_ID = null;
  var IMG_STATE = ['','','','',''];

  loadEquipment();

  function loadEquipment() {
    api({ action: 'getEquipment' }).then(function(data) {
      ALL_EQ = data.items || [];
      renderTable(ALL_EQ);
    });
  }

  function renderTable(items) {
    var body = document.getElementById('eq-table-body');
    if (!items.length) {
      body.innerHTML = '<div class="text-center py-20 text-slate-400 text-sm font-semibold shadow-sm">ไม่มีรายการอุปกรณ์ในระบบ</div>';
      return;
    }
    
    body.innerHTML = '<div class="overflow-x-auto"><table class="w-full text-sm">'
      + '<thead><tr class="bg-slate-50/50 border-b border-slate-100 text-slate-500 uppercase tracking-wider font-extrabold text-[10px]">'
      + '<th class="text-left px-6 py-4.5 font-bold">ข้อมูลอุปกรณ์</th>'
      + '<th class="text-left px-6 py-4.5 font-bold">รหัสทรัพย์สิน</th>'
      + '<th class="text-left px-6 py-4.5 font-bold">หมวดหมู่</th>'
      + '<th class="text-center px-6 py-4.5 font-bold">สต็อกทั้งหมด</th>'
      + '<th class="text-center px-6 py-4.5 font-bold">ว่างให้ยืม</th>'
      + '<th class="px-6 py-4.5"></th>'
      + '</tr></thead><tbody class="divide-y divide-slate-100">'
      + items.map(function(eq) {
        var thumb = eq.images && eq.images[0]
          ? '<img src="'+eq.images[0]+'" class="w-10 h-10 rounded-xl object-cover border border-slate-200">'
          : '<div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 text-[10px] font-bold border border-slate-200/50">—</div>';
        
        var avail = eq.availStock > 0
          ? '<span class="px-2.5 py-1 bg-emerald-50 text-emerald-700 rounded-full font-bold ring-1 ring-emerald-600/10">'+eq.availStock+'</span>'
          : '<span class="px-2.5 py-1 bg-rose-50 text-rose-700 rounded-full font-bold ring-1 ring-rose-600/10">'+eq.availStock+'</span>';
        
        return '<tr class="hover:bg-slate-50/30 transition duration-150">'
          + '<td class="px-6 py-4"><div class="flex items-center gap-3">'+thumb+'<div><p class="font-extrabold text-slate-800 leading-snug">'+eq.name+'</p><p class="text-[10px] font-bold text-slate-400 mt-0.5">'+eq.itemId+'</p></div></div></td>'
          + '<td class="px-6 py-4 text-slate-600 font-semibold">'+(eq.assetCode||'—')+'</td>'
          + '<td class="px-6 py-4"><span class="px-2.5 py-1 bg-brand-50 text-brand-700 rounded-full text-[11px] font-bold ring-1 ring-brand-600/10">'+(eq.category||'ทั่วไป')+'</span></td>'
          + '<td class="px-6 py-4 text-center font-bold text-slate-700">'+eq.totalStock+'</td>'
          + '<td class="px-6 py-4 text-center">'+avail+'</td>'
          + '<td class="px-6 py-4 text-right">'
          + '<button onclick=\'openImgModal('+JSON.stringify(eq)+')\' class="text-brand-600 hover:text-brand-700 font-bold text-xs px-3 py-1.5 hover:bg-brand-50 border border-transparent hover:border-brand-100 rounded-xl transition">🖼️ จัดการรูปภาพ</button>'
          + '</td></tr>';
      }).join('')
      + '</tbody></table></div>';
  }

  function filterTable() {
    var q = document.getElementById('search-eq').value.toLowerCase();
    var filtered = ALL_EQ.filter(function(e) {
      return (e.name||'').toLowerCase().includes(q) || (e.assetCode||'').toLowerCase().includes(q) || (e.category||'').toLowerCase().includes(q);
    });
    renderTable(filtered);
  }

  function openAddModal() {
    ['add-name','add-asset','add-cat','add-specs'].forEach(function(id){ document.getElementById(id).value=''; });
    document.getElementById('add-qty').value = '1';
    document.getElementById('err-add').classList.add('hidden');
    document.getElementById('btn-add').textContent = 'เพิ่มอุปกรณ์';
    document.getElementById('modal-add').classList.remove('hidden');
    document.getElementById('add-name').focus();
  }

  function submitAdd() {
    var name = document.getElementById('add-name').value.trim();
    var qty  = document.getElementById('add-qty').value;
    if (!name) { showAddErr('กรุณากรอกชื่อรายการอุปกรณ์'); return; }
    
    document.getElementById('btn-add').textContent = 'กำลังบันทึก...';
    document.getElementById('btn-add').disabled = true;
    
    api({ action:'addEquipment', name:name, assetCode:document.getElementById('add-asset').value.trim(),
          category:document.getElementById('add-cat').value.trim(), totalStock:qty,
          specs:document.getElementById('add-specs').value.trim() })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        closeModal('modal-add');
        showToast('เพิ่มอุปกรณ์ลงในคลังเรียบร้อยแล้ว', 'ok');
        loadEquipment();
      }).catch(function(err) {
        showAddErr(err.message);
        document.getElementById('btn-add').textContent = 'เพิ่มอุปกรณ์';
        document.getElementById('btn-add').disabled = false;
      });
  }
  
  function showAddErr(msg) { var el = document.getElementById('err-add'); el.textContent=msg; el.classList.remove('hidden'); }

  // ── Image editing ──────────────────────────────────────────
  function openImgModal(eq) {
    IMG_EDIT_ID = eq.itemId;
    IMG_STATE = [eq.images[0]||'', eq.images[1]||'', eq.images[2]||'', eq.images[3]||'', eq.images[4]||''];
    document.getElementById('imgs-title').textContent = 'รูปภาพอุปกรณ์ — ' + eq.name;
    renderImgSlots();
    document.getElementById('modal-imgs').classList.remove('hidden');
  }

  function renderImgSlots() {
    var slots = document.getElementById('img-slots');
    slots.innerHTML = IMG_STATE.map(function(url, i) {
      if (url) {
        return '<div class="relative"><img src="'+url+'" class="slot-img" onclick="document.getElementById(\'file-'+i+'\').click()">'
          + '<button onclick="removeImg('+i+')" class="absolute -top-1.5 -right-1.5 w-5.5 h-5.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full text-xs font-bold flex items-center justify-center shadow-md shadow-rose-500/20 border border-white">✕</button>'
          + '<input type="file" id="file-'+i+'" accept="image/*" class="hidden" onchange="uploadEqImg('+i+',this)"></div>';
      }
      return '<label class="w-[68px] h-[68px] border-2 border-dashed border-slate-300 rounded-2xl flex items-center justify-center cursor-pointer hover:border-brand-500 text-slate-400 hover:text-brand-500 hover:bg-brand-50/50 transition duration-200">'
        + '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>'
        + '<input type="file" accept="image/*" class="hidden" onchange="uploadEqImg('+i+',this)"></label>';
    }).join('');
  }

  function removeImg(i) { IMG_STATE[i] = ''; renderImgSlots(); }

  function uploadEqImg(i, input) {
    var file = input.files[0]; if (!file) return;
    showToast('กำลังอัปโหลดรูปภาพเข้าฐานข้อมูล...', 'ok');
    uploadToImgBB(file).then(function(url) {
      IMG_STATE[i] = url;
      renderImgSlots();
      showToast('อัปโหลดรูปภาพสำเร็จเรียบร้อย', 'ok');
    }).catch(function() { showToast('เกิดข้อผิดพลาดในการอัปโหลดรูปภาพ', 'error'); });
  }

  function saveEqImages() {
    var btn = document.getElementById('btn-save-imgs');
    btn.textContent = 'กำลังบันทึก...';
    btn.disabled = true;
    
    api({ action:'updateEquipmentImages', itemId:IMG_EDIT_ID,
          img1:IMG_STATE[0], img2:IMG_STATE[1], img3:IMG_STATE[2], img4:IMG_STATE[3], img5:IMG_STATE[4] })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        closeModal('modal-imgs');
        showToast('อัปเดตรูปภาพอุปกรณ์เรียบร้อยแล้ว', 'ok');
        loadEquipment();
      }).catch(function() { showToast('ไม่สามารถอัปเดตรูปภาพได้', 'error'); })
      .finally(function() {
        btn.textContent = 'บันทึกรูปภาพ';
        btn.disabled = false;
      });
  }

  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
}
</script>
</body>
</html>
