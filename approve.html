<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>อนุมัติคำขอ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Sarabun',sans-serif;}</style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="layout-wrapper" class="ml-64 pt-16 min-h-screen">
  <main class="p-6">
    <div class="mb-6"><h1 class="text-xl font-bold text-gray-900">อนุมัติคำขอ</h1>
    <p class="text-sm text-gray-500 mt-0.5">จัดการคำขอยืม-คืนอุปกรณ์</p></div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-5">
      <button onclick="setTab('pending')" id="tab-pending" class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold transition bg-blue-600 text-white">รออนุมัติ</button>
      <button onclick="setTab('active')" id="tab-active" class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold transition bg-white border border-gray-200 text-gray-600 hover:bg-gray-50">กำลังยืม</button>
      <button onclick="setTab('pending_return')" id="tab-pending_return" class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold transition bg-white border border-gray-200 text-gray-600 hover:bg-gray-50">รอยืนยันคืน</button>
      <button onclick="setTab('all')" id="tab-all" class="tab-btn px-4 py-2 rounded-xl text-sm font-semibold transition bg-white border border-gray-200 text-gray-600 hover:bg-gray-50">ทั้งหมด</button>
    </div>

    <div id="req-list"><div class="flex items-center justify-center py-16 text-gray-400"><svg class="animate-spin w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>กำลังโหลด...</div></div>
  </main>
</div>

<!-- Action Modal -->
<div id="modal-action" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-gray-900 text-lg" id="modal-action-title">อนุมัติคำขอ</h3>
      <button onclick="closeActionModal()" class="text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div id="modal-action-body" class="mb-4"></div>
    <div id="modal-note-wrap" class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">หมายเหตุ (ถ้ามี)</label>
      <textarea id="modal-note" rows="2" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
    </div>
    <div id="modal-retdate-wrap" class="mb-4 hidden">
      <label class="block text-sm font-medium text-gray-700 mb-1">วันที่คืน (กำหนดโดย admin)</label>
      <input type="date" id="modal-retdate" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="flex gap-3">
      <button onclick="closeActionModal()" class="flex-1 border border-gray-300 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition">ยกเลิก</button>
      <button onclick="confirmAction()" id="btn-confirm-action" class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition text-white bg-blue-600 hover:bg-blue-700">ยืนยัน</button>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-opacity pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAdmin();
if (ME) {
  renderLayout('approve');
  var ALL_REQS = [];
  var CUR_TAB  = 'pending';
  var ACT_REQ  = null;
  var ACT_TYPE = null;

  loadRequests();

  function loadRequests() {
    api({ action: 'getAllRequests' }).then(function(data) {
      ALL_REQS = data.requests || [];
      renderList();
    });
  }

  function setTab(tab) {
    CUR_TAB = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.className = 'tab-btn px-4 py-2 rounded-xl text-sm font-semibold transition bg-white border border-gray-200 text-gray-600 hover:bg-gray-50';
    });
    document.getElementById('tab-' + tab).className = 'tab-btn px-4 py-2 rounded-xl text-sm font-semibold transition bg-blue-600 text-white';
    renderList();
  }

  function renderList() {
    var items = CUR_TAB === 'all' ? ALL_REQS : ALL_REQS.filter(function(r){ return r.status === CUR_TAB; });
    var el = document.getElementById('req-list');
    if (!items.length) { el.innerHTML = '<div class="bg-white rounded-2xl border border-gray-200 text-center py-16 text-sm text-gray-400">ไม่มีรายการ</div>'; return; }

    var statusMap = { pending:'รออนุมัติ', active:'กำลังยืม', pending_return:'รอยืนยันคืน', returned:'คืนแล้ว', rejected:'ปฏิเสธ' };
    var colorMap = { pending:'bg-yellow-100 text-yellow-700', active:'bg-blue-100 text-blue-700', pending_return:'bg-purple-100 text-purple-700', returned:'bg-green-100 text-green-700', rejected:'bg-red-100 text-red-700' };

    el.innerHTML = '<div class="space-y-3">' + items.map(function(r) {
      var cls = colorMap[r.status] || 'bg-gray-100 text-gray-600';
      var btns = '';
      if (r.status === 'pending') {
        btns = '<button onclick=\'openAction("approve",'+JSON.stringify(r)+')\' class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-xs font-semibold transition">อนุมัติ</button>'
             + '<button onclick=\'openAction("reject",'+JSON.stringify(r)+')\' class="px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white rounded-lg text-xs font-semibold transition">ปฏิเสธ</button>';
      } else if (r.status === 'pending_return') {
        btns = '<button onclick=\'openAction("confirm",'+JSON.stringify(r)+')\' class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-semibold transition">ยืนยันรับคืน</button>';
      }
      return '<div class="bg-white rounded-2xl border border-gray-200 p-5">'
        + '<div class="flex items-start justify-between gap-3 mb-3">'
        + '<div><p class="font-semibold text-gray-900">' + r.empName + ' <span class="text-gray-400 font-normal text-sm">(' + r.dept + ')</span></p>'
        + '<p class="text-xs text-gray-400 mt-0.5">คำขอ: ' + r.requestId + ' · ' + r.requestedAt + '</p></div>'
        + '<span class="px-2.5 py-1 rounded-full text-xs font-semibold flex-shrink-0 ' + cls + '">' + (statusMap[r.status]||r.status) + '</span>'
        + '</div>'
        + '<p class="text-sm text-gray-600 mb-1"><span class="font-medium">วัตถุประสงค์:</span> ' + (r.purpose||'—') + '</p>'
        + '<p class="text-sm text-gray-600 mb-3"><span class="font-medium">วันคืนที่ขอ:</span> ' + (r.returnDateProposed||'—') + '</p>'
        + (btns ? '<div class="flex gap-2">' + btns + '</div>' : '')
        + '</div>';
    }).join('') + '</div>';
  }

  function openAction(type, req) {
    ACT_REQ = req; ACT_TYPE = type;
    var titles = { approve:'อนุมัติคำขอ', reject:'ปฏิเสธคำขอ', confirm:'ยืนยันรับคืน' };
    var colors = { approve:'bg-green-600 hover:bg-green-700', reject:'bg-red-500 hover:bg-red-600', confirm:'bg-blue-600 hover:bg-blue-700' };
    document.getElementById('modal-action-title').textContent = titles[type];
    document.getElementById('modal-action-body').innerHTML =
      '<div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-700">'
      + '<p><span class="font-medium">พนักงาน:</span> ' + req.empName + '</p>'
      + '<p class="mt-1"><span class="font-medium">วัตถุประสงค์:</span> ' + (req.purpose||'—') + '</p>'
      + '</div>';
    document.getElementById('modal-note').value = '';
    document.getElementById('modal-retdate-wrap').classList.toggle('hidden', type !== 'approve');
    var btn = document.getElementById('btn-confirm-action');
    btn.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold transition text-white ' + colors[type];
    document.getElementById('modal-action').classList.remove('hidden');
  }

  function closeActionModal() { document.getElementById('modal-action').classList.add('hidden'); }

  function confirmAction() {
    var btn = document.getElementById('btn-confirm-action');
    btn.disabled = true; btn.textContent = 'กำลังดำเนินการ...';
    var p = { empId: ME.empId };
    if (ACT_TYPE === 'approve') {
      p.action = 'approveRequest'; p.requestId = ACT_REQ.requestId;
      p.adminNote = document.getElementById('modal-note').value;
      p.returnDateFinal = document.getElementById('modal-retdate').value;
    } else if (ACT_TYPE === 'reject') {
      p.action = 'rejectRequest'; p.requestId = ACT_REQ.requestId;
      p.adminNote = document.getElementById('modal-note').value;
    } else {
      p.action = 'confirmReturn'; p.requestId = ACT_REQ.requestId;
      p.adminNote = document.getElementById('modal-note').value;
    }
    api(p).then(function(d) {
      if (d.error) throw new Error(d.error);
      closeActionModal();
      showToast('ดำเนินการเรียบร้อย', 'ok');
      loadRequests();
    }).catch(function(err) {
      showToast(err.message, 'error');
    }).finally(function() {
      btn.disabled = false;
      btn.textContent = 'ยืนยัน';
    });
  }
}
</script>
</body>
</html>
