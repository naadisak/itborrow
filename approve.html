<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>อนุมัติคำขอ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1">
    <div class="mb-8 animate-fade-in">
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">อนุมัติคำขอ</h1>
      <p class="text-sm font-medium text-slate-500 mt-1">บริหารจัดการและอนุมัติรายการคำขอยืม-คืนอุปกรณ์ไอทีของพนักงาน</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6 flex-wrap animate-fade-in">
      <button onclick="setTab('pending')" id="tab-pending" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-brand-600 text-white shadow-md shadow-brand-600/15">รออนุมัติ</button>
      <button onclick="setTab('active')" id="tab-active" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">กำลังยืม</button>
      <button onclick="setTab('pending_return')" id="tab-pending_return" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">รอยืนยันคืน</button>
      <button onclick="setTab('all')" id="tab-all" class="tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">ทั้งหมด</button>
    </div>

    <div id="req-list" class="animate-fade-in">
      <div class="flex items-center justify-center py-20 text-slate-400">
        <svg class="animate-spin w-6 h-6 mr-2 text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
        <span class="font-medium text-sm">กำลังโหลดข้อมูลคำขอ...</span>
      </div>
    </div>
  </main>
</div>

<!-- Action Modal -->
<div id="modal-action" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-lg p-6.5 md:p-8 shadow-2xl border border-slate-100 max-h-[90vh] overflow-y-auto animate-fade-in">
    <div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100">
      <h3 class="font-bold text-slate-900 text-lg tracking-tight" id="modal-action-title">อนุมัติคำขอ</h3>
      <button onclick="closeActionModal()" class="text-slate-400 hover:text-slate-600 p-1.5 hover:bg-slate-50 rounded-xl transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    
    <div id="modal-action-body" class="mb-5"></div>
    
    <div id="modal-note-wrap" class="mb-5">
      <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">หมายเหตุการพิจารณา (ระบุลงในระบบ)</label>
      <textarea id="modal-note" rows="2.5" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold placeholder-slate-400 resize-none"></textarea>
    </div>
    
    <div id="modal-retdate-wrap" class="mb-6 hidden">
      <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2">กำหนดส่งคืนอุปกรณ์ (กำหนดโดยผู้ดูแลระบบ)</label>
      <input type="date" id="modal-retdate" class="w-full border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition duration-200 font-semibold text-slate-800">
    </div>
    
    <div class="flex gap-4">
      <button onclick="closeActionModal()" class="flex-1 border border-slate-200 text-slate-700 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 hover:border-slate-300 transition">ยกเลิก</button>
      <button onclick="confirmAction()" id="btn-confirm-action" class="flex-1 py-3 rounded-2xl text-sm font-bold shadow-lg text-white">ยืนยัน</button>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAdmin();
if (ME) {
  renderLayout('approve');
  var ALL_REQS = [];
  var CUR_TAB  = 'pending';
  var ACT_REQ  = null;
  var ACT_TYPE = null;

  loadRequests();

  function loadRequests() {
    api({ action: 'getAllRequests' }).then(function(data) {
      ALL_REQS = data.requests || [];
      renderList();
    });
  }

  function setTab(tab) {
    CUR_TAB = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.className = 'tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300';
    });
    document.getElementById('tab-' + tab).className = 'tab-btn px-4 py-2 rounded-2xl text-xs font-bold transition bg-brand-600 text-white shadow-md shadow-brand-600/15';
    renderList();
  }

  function renderList() {
    var items = CUR_TAB === 'all' ? ALL_REQS : ALL_REQS.filter(function(r){ return r.status === CUR_TAB; });
    var el = document.getElementById('req-list');
    if (!items.length) { el.innerHTML = '<div class="bg-white rounded-3xl border border-slate-100 text-center py-20 text-sm font-semibold text-slate-400 shadow-sm shadow-slate-100/50">ไม่มีรายการคำขอในแผนกนี้</div>'; return; }

    var statusMap = { pending:'รออนุมัติ', active:'กำลังยืม', pending_return:'รอยืนยันคืน', returned:'คืนแล้ว', rejected:'ปฏิเสธ', approved:'อนุมัติ' };
    var colorMap = { pending:'bg-amber-50 text-amber-700 ring-1 ring-amber-600/10', active:'bg-brand-50 text-brand-700 ring-1 ring-brand-600/10', pending_return:'bg-purple-50 text-purple-700 ring-1 ring-purple-600/10', returned:'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/10', rejected:'bg-rose-50 text-rose-700 ring-1 ring-rose-600/10' };

    el.innerHTML = '<div class="space-y-4">' + items.map(function(r) {
      var cls = colorMap[r.status] || 'bg-slate-50 text-slate-600';
      var btns = '';
      if (r.status === 'pending') {
        btns = '<button onclick=\'openAction("approve",'+JSON.stringify(r)+')\' class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold shadow-md shadow-emerald-600/15 transition flex items-center gap-1.5">อนุมัติ</button>'
             + '<button onclick=\'openAction("reject",'+JSON.stringify(r)+')\' class="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-xs font-bold shadow-md shadow-rose-600/15 transition flex items-center gap-1.5">ปฏิเสธ</button>';
      } else if (r.status === 'pending_return') {
        btns = '<button onclick=\'openAction("confirm",'+JSON.stringify(r)+')\' class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl text-xs font-bold shadow-md shadow-brand-600/15 transition flex items-center gap-1.5">ยืนยันรับคืน</button>';
      }

      // Render requested items list
      var itemsHtml = '';
      if (r.items && r.items.length > 0) {
        itemsHtml = '<div class="bg-slate-50 rounded-2xl p-4.5 mb-4 border border-slate-100/60">'
          + '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2.5">อุปกรณ์ที่ขอยืม</p>'
          + '<div class="space-y-2">'
          + r.items.map(function(it) {
            return '<div class="flex items-center justify-between text-xs font-semibold text-slate-700">'
              + '<span class="truncate pr-3 flex items-center gap-2"><svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="4" ry="4"/></svg>' + it.itemName + '</span>'
              + '<span class="bg-white border border-slate-200 px-2 py-0.5 rounded text-slate-600 font-bold">x' + it.qty + '</span>'
              + '</div>';
          }).join('')
          + '</div></div>';
      }

      return '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/50 hover:shadow-md hover:shadow-slate-100/70 transition duration-200">'
        + '<div class="flex items-start justify-between gap-3 mb-4 pb-3 border-b border-slate-50">'
        + '<div><p class="font-extrabold text-slate-800 text-sm tracking-wide">' + r.empName + ' <span class="text-slate-400 font-medium text-xs">(' + r.dept + ')</span></p>'
        + '<p class="text-[11px] font-bold text-slate-400 mt-0.5">คำขอ: ' + r.requestId + ' · วันที่ขอ: ' + r.requestedAt + '</p></div>'
        + '<span class="px-2.5 py-1 rounded-full text-[11px] font-bold flex-shrink-0 ' + cls + '">' + (statusMap[r.status]||r.status) + '</span>'
        + '</div>'
        
        + itemsHtml
        
        + '<div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs font-semibold text-slate-500 mb-4">'
        + '<div><span class="text-slate-400">วัตถุประสงค์:</span> <span class="text-slate-700 ml-1">' + (r.purpose||'—') + '</span></div>'
        + '<div><span class="text-slate-400">กำหนดคืนที่ขอมา:</span> <span class="text-slate-700 ml-1">' + (r.returnDateProposed||'—') + '</span></div>'
        + '</div>'
        
        + (r.adminNote ? '<div class="text-xs font-semibold text-slate-600 bg-slate-50 border border-slate-100 rounded-2xl px-4 py-3.5 mb-4 flex gap-1.5">💡 <span class="text-slate-700"><strong class="font-bold text-slate-800">บันทึกเพิ่มเติม:</strong> ' + r.adminNote + '</span></div>' : '')
        
        + (btns ? '<div class="flex gap-2 border-t border-slate-50 pt-4 mt-2">' + btns + '</div>' : '')
        + '</div>';
    }).join('') + '</div>';
  }

  function openAction(type, req) {
    ACT_REQ = req; ACT_TYPE = type;
    var titles = { approve:'อนุมัติคำขอยืมอุปกรณ์', reject:'ปฏิเสธคำขอยืมอุปกรณ์', confirm:'ยืนยันการรับคืนอุปกรณ์' };
    var colors = { approve:'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-600/25', reject:'bg-rose-500 hover:bg-rose-600 shadow-rose-500/25', confirm:'bg-brand-600 hover:bg-brand-700 shadow-brand-600/25' };
    
    // Render requested items list in the modal too
    var itemsHtml = '';
    if (req.items && req.items.length > 0) {
      itemsHtml = '<div class="bg-white border border-slate-200/80 rounded-2xl p-4 mt-3 space-y-1.5">'
        + '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">รายการอุปกรณ์ที่ยืม</p>'
        + req.items.map(function(it) {
          return '<div class="flex items-center justify-between text-xs font-bold text-slate-700"><span>' + it.itemName + '</span><span>x' + it.qty + '</span></div>';
        }).join('')
        + '</div>';
    }

    document.getElementById('modal-action-title').textContent = titles[type];
    document.getElementById('modal-action-body').innerHTML =
      '<div class="bg-slate-50 border border-slate-100 rounded-2xl p-4.5 text-sm font-semibold text-slate-700">'
      + '<p class="text-slate-500 text-xs">ข้อมูลพนักงานผู้ยืม</p>'
      + '<p class="text-slate-800 font-extrabold mt-0.5">' + req.empName + ' <span class="text-slate-400 font-medium text-xs">(' + req.dept + ')</span></p>'
      + '<p class="text-slate-500 text-xs mt-3">วัตถุประสงค์การยืม</p>'
      + '<p class="text-slate-700 text-xs font-bold mt-0.5">' + (req.purpose||'—') + '</p>'
      + itemsHtml
      + '</div>';
      
    document.getElementById('modal-note').value = '';
    document.getElementById('modal-retdate-wrap').classList.toggle('hidden', type !== 'approve');
    
    // Autofill proposed date if approving
    if (type === 'approve') {
      var proposed = req.returnDateProposed || '';
      if (proposed && proposed.indexOf('/') > -1) {
        // convert dd/MM/yyyy to yyyy-MM-dd
        var parts = proposed.split(' ');
        var dParts = parts[0].split('/');
        if (dParts.length === 3) {
          proposed = dParts[2] + '-' + dParts[1] + '-' + dParts[0];
        }
      }
      document.getElementById('modal-retdate').value = proposed;
    }
    
    var btn = document.getElementById('btn-confirm-action');
    btn.className = 'flex-1 py-3 rounded-2xl text-sm font-bold shadow-lg text-white transition ' + colors[type];
    document.getElementById('modal-action').classList.remove('hidden');
  }

  function closeActionModal() { document.getElementById('modal-action').classList.add('hidden'); }

  function confirmAction() {
    var btn = document.getElementById('btn-confirm-action');
    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
    var p = { empId: ME.empId };
    
    if (ACT_TYPE === 'approve') {
      p.action = 'approveRequest'; p.requestId = ACT_REQ.requestId;
      p.adminNote = document.getElementById('modal-note').value;
      p.returnDateFinal = document.getElementById('modal-retdate').value;
      if (!p.returnDateFinal) {
        showToast('กรุณาระบุวันกำหนดส่งคืนอุปกรณ์ก่อนอนุมัติ', 'error');
        btn.disabled = false; btn.textContent = 'ยืนยัน';
        return;
      }
    } else if (ACT_TYPE === 'reject') {
      p.action = 'rejectRequest'; p.requestId = ACT_REQ.requestId;
      p.adminNote = document.getElementById('modal-note').value;
    } else {
      p.action = 'confirmReturn'; p.requestId = ACT_REQ.requestId;
      p.adminNote = document.getElementById('modal-note').value;
    }
    
    api(p).then(function(d) {
      if (d.error) throw new Error(d.error);
      closeActionModal();
      showToast('ดำเนินการทำรายการเรียบร้อยแล้ว', 'ok');
      loadRequests();
    }).catch(function(err) {
      showToast(err.message, 'error');
    }).finally(function() {
      btn.disabled = false;
      btn.textContent = 'ยืนยัน';
    });
  }
}
</script>
</body>
</html>
