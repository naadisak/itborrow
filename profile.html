<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>โปรไฟล์ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .pin-box {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .pin-box:focus {
    border-color: #465fff;
    box-shadow: 0 0 0 4px rgba(70, 95, 255, 0.15);
  }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1 max-w-3xl animate-fade-in">
    <div class="mb-8">
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">โปรไฟล์</h1>
      <p class="text-sm font-medium text-slate-500 mt-1">ข้อมูลส่วนตัว การตั้งค่ารหัสผ่าน และรูปประจำตัวของคุณ</p>
    </div>

    <!-- Profile card -->
    <div class="bg-white rounded-3xl border border-slate-100 p-6 md:p-8 mb-6 shadow-sm shadow-slate-100/50">
      <div class="flex flex-col sm:flex-row items-center gap-6 mb-8 pb-6 border-b border-slate-50">
        <div class="relative flex-shrink-0">
          <div id="avatar-wrap" class="w-24 h-24 rounded-2xl bg-brand-500 flex items-center justify-center text-white text-3xl font-bold overflow-hidden cursor-pointer hover:opacity-90 transition shadow-lg shadow-brand-500/10 ring-4 ring-white" onclick="document.getElementById('file-avatar').click()">
            <span id="avatar-init"></span>
          </div>
          <div id="avatar-upload-overlay" class="hidden absolute inset-0 bg-slate-950/60 rounded-2xl flex items-center justify-center">
            <svg class="animate-spin w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
          </div>
          <div class="absolute -bottom-2 -right-2 w-8 h-8 bg-brand-600 hover:bg-brand-700 rounded-xl flex items-center justify-center shadow-md cursor-pointer border-2 border-white transition" onclick="document.getElementById('file-avatar').click()">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
          </div>
          <input type="file" id="file-avatar" accept="image/*" class="hidden" onchange="uploadAvatar(this)">
        </div>
        
        <div class="text-center sm:text-left">
          <h2 id="profile-name" class="text-xl font-extrabold text-slate-800 leading-tight"></h2>
          <p id="profile-role" class="text-xs font-bold uppercase tracking-wider text-slate-400 mt-1.5 inline-block bg-slate-50 border border-slate-200/50 px-3 py-1 rounded-lg"></p>
          <p class="text-[11px] font-semibold text-slate-400 mt-2.5">💡 คลิกที่รูปภาพหรือไอคอนเพื่ออัปโหลดเปลี่ยนรูปประจำตัว</p>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-sm font-semibold text-slate-500">
        <div class="bg-slate-50/50 border border-slate-100 p-4.5 rounded-2xl">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">รหัสพนักงาน</p>
          <p class="font-extrabold text-slate-800 text-base" id="info-empid">—</p>
        </div>
        <div class="bg-slate-50/50 border border-slate-100 p-4.5 rounded-2xl">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">สังกัด / แผนก</p>
          <p class="font-extrabold text-slate-800 text-base" id="info-dept">—</p>
        </div>
        <div class="bg-slate-50/50 border border-slate-100 p-4.5 rounded-2xl">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">เบอร์โทรศัพท์ติดต่อ</p>
          <p class="font-extrabold text-slate-800 text-base" id="info-phone">—</p>
        </div>
        <div class="bg-slate-50/50 border border-slate-100 p-4.5 rounded-2xl">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">อีเมลพนักงาน</p>
          <p class="font-extrabold text-slate-800 text-base break-all" id="info-email">—</p>
        </div>
      </div>
    </div>

    <!-- Change PIN -->
    <div class="bg-white rounded-3xl border border-slate-100 p-6 md:p-8 shadow-sm shadow-slate-100/50">
      <h3 class="font-bold text-slate-800 text-base tracking-tight mb-1">เปลี่ยนรหัสผ่าน (PIN)</h3>
      <p class="text-xs font-medium text-slate-400 mb-6">ตั้งรหัสผ่านเป็นหมายเลข PIN 6 หลักใหม่สำหรับการเข้าล็อกอินใช้งานระบบ</p>

      <div class="mb-5">
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2.5">กรอก PIN ใหม่ 6 หลัก</label>
        <div class="flex gap-2.5" id="newpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        </div>
      </div>
      
      <div class="mb-6">
        <label class="block text-xs uppercase tracking-wider font-bold text-slate-500 mb-2.5">ยืนยัน PIN ใหม่อีกครั้ง</label>
        <div class="flex gap-2.5" id="confirmpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border border-slate-200 rounded-xl bg-slate-50/50">
        </div>
      </div>
      
      <div id="err-pin" class="hidden bg-rose-50 text-rose-600 text-xs px-4 py-3.5 rounded-2xl border border-rose-100 mb-6 font-semibold leading-relaxed"></div>
      
      <button onclick="changePin()" id="btn-change-pin" class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-lg shadow-brand-600/25 transition">บันทึก PIN ใหม่</button>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAuth();
if (ME) {
  renderLayout('profile');

  // Fill info
  document.getElementById('profile-name').textContent = ME.fullName;
  document.getElementById('profile-role').textContent = ME.role === 'admin' ? '🔑 ผู้ดูแลระบบ (Admin)' : '👤 พนักงาน (User)';
  document.getElementById('info-empid').textContent = ME.empId;
  document.getElementById('info-dept').textContent = ME.dept || '—';
  document.getElementById('info-phone').textContent = ME.phone || '—';
  document.getElementById('info-email').textContent = ME.email || '—';

  var initEl = document.getElementById('avatar-init');
  if (ME.avatarUrl) {
    var wrap = document.getElementById('avatar-wrap');
    wrap.innerHTML = '';
    var img = document.createElement('img');
    img.src = ME.avatarUrl;
    img.className = 'w-full h-full object-cover';
    wrap.appendChild(img);
  } else {
    initEl.textContent = ME.firstName ? ME.firstName.charAt(0) : '?';
  }

  // ── PIN boxes ──
  function initPinBoxes(containerId) {
    var boxes = document.querySelectorAll('#' + containerId + ' .pin-box');
    boxes.forEach(function(box, i) {
      box.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g,'').slice(-1);
        if (this.value && i < boxes.length - 1) boxes[i+1].focus();
      });
      box.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) boxes[i-1].focus();
      });
    });
  }
  function getPinValue(cid) {
    return Array.from(document.querySelectorAll('#' + cid + ' .pin-box')).map(function(b){ return b.value; }).join('');
  }
  function clearPinBoxes(cid) {
    document.querySelectorAll('#' + cid + ' .pin-box').forEach(function(b){ b.value=''; });
  }

  initPinBoxes('newpin-boxes');
  initPinBoxes('confirmpin-boxes');

  function changePin() {
    var p1 = getPinValue('newpin-boxes');
    var p2 = getPinValue('confirmpin-boxes');
    var errEl = document.getElementById('err-pin');
    errEl.classList.add('hidden');
    if (p1.length !== 6) { errEl.textContent='กรุณากรอก PIN ให้ครบ 6 หลัก'; errEl.classList.remove('hidden'); return; }
    if (p1 !== p2) { errEl.textContent='รหัสผ่าน PIN ไม่ตรงกัน กรุณาทำรายการใหม่'; errEl.classList.remove('hidden'); clearPinBoxes('confirmpin-boxes'); return; }

    var btn = document.getElementById('btn-change-pin');
    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

    api({ action: 'setPin', empId: ME.empId, pin: p1 }).then(function(d) {
      if (d.error) throw new Error(d.error);
      clearPinBoxes('newpin-boxes'); clearPinBoxes('confirmpin-boxes');
      showToast('แก้ไขรหัสผ่าน PIN สำเร็จเรียบร้อยแล้ว', 'ok');
    }).catch(function(err) {
      errEl.textContent = err.message; errEl.classList.remove('hidden');
    }).finally(function() {
      btn.disabled = false; btn.textContent = 'บันทึก PIN ใหม่';
    });
  }

  // ── Avatar upload ──
  function uploadAvatar(input) {
    var file = input.files[0]; if (!file) return;
    document.getElementById('avatar-upload-overlay').classList.remove('hidden');
    uploadToImgBB(file).then(function(url) {
      ME.avatarUrl = url;
      setSession(ME);
      var wrap = document.getElementById('avatar-wrap');
      wrap.innerHTML = '<img src="'+url+'" class="w-full h-full object-cover">';
      document.getElementById('avatar-upload-overlay').classList.add('hidden');
      return api({ action: 'updateAvatar', empId: ME.empId, avatarUrl: url });
    }).then(function() {
      showToast('อัปโหลดรูปประจำตัวเรียบร้อยแล้ว', 'ok');
    }).catch(function() {
      document.getElementById('avatar-upload-overlay').classList.add('hidden');
      showToast('ไม่สามารถอัปโหลดรูปประจำตัวได้', 'error');
    });
  }
}
</script>
</body>
</html>
