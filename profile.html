<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>โปรไฟล์ — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Sarabun',sans-serif;} .pin-box:focus{border-color:#3b82f6;outline:none;box-shadow:0 0 0 3px rgba(59,130,246,.15);}</style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="layout-wrapper" class="ml-64 pt-16 min-h-screen">
  <main class="p-6 max-w-2xl">
    <div class="mb-6"><h1 class="text-xl font-bold text-gray-900">โปรไฟล์</h1>
    <p class="text-sm text-gray-500 mt-0.5">ข้อมูลส่วนตัวและการตั้งค่า</p></div>

    <!-- Profile card -->
    <div class="bg-white rounded-2xl border border-gray-200 p-6 mb-4">
      <div class="flex items-center gap-5 mb-6">
        <div class="relative">
          <div id="avatar-wrap" class="w-20 h-20 rounded-2xl bg-blue-500 flex items-center justify-center text-white text-2xl font-bold overflow-hidden cursor-pointer hover:opacity-90 transition" onclick="document.getElementById('file-avatar').click()">
            <span id="avatar-init"></span>
          </div>
          <div id="avatar-upload-overlay" class="hidden absolute inset-0 bg-black/50 rounded-2xl flex items-center justify-center">
            <svg class="animate-spin w-5 h-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
          </div>
          <div class="absolute -bottom-1 -right-1 w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center shadow-sm cursor-pointer" onclick="document.getElementById('file-avatar').click()">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
          </div>
          <input type="file" id="file-avatar" accept="image/*" class="hidden" onchange="uploadAvatar(this)">
        </div>
        <div>
          <h2 id="profile-name" class="text-lg font-bold text-gray-900"></h2>
          <p id="profile-role" class="text-sm text-gray-500 mt-0.5"></p>
          <p class="text-xs text-gray-400 mt-1">คลิกที่รูปเพื่อเปลี่ยน avatar</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 text-sm">
        <div><p class="text-gray-500 text-xs mb-0.5">รหัสพนักงาน</p><p class="font-medium text-gray-900" id="info-empid"></p></div>
        <div><p class="text-gray-500 text-xs mb-0.5">แผนก</p><p class="font-medium text-gray-900" id="info-dept"></p></div>
        <div><p class="text-gray-500 text-xs mb-0.5">โทร</p><p class="font-medium text-gray-900" id="info-phone"></p></div>
        <div><p class="text-gray-500 text-xs mb-0.5">อีเมล</p><p class="font-medium text-gray-900" id="info-email"></p></div>
      </div>
    </div>

    <!-- Change PIN -->
    <div class="bg-white rounded-2xl border border-gray-200 p-6">
      <h3 class="font-semibold text-gray-900 mb-1">เปลี่ยน PIN</h3>
      <p class="text-sm text-gray-500 mb-5">ตั้ง PIN 6 หลักใหม่สำหรับการเข้าสู่ระบบ</p>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2.5">PIN ใหม่</label>
        <div class="flex gap-3" id="newpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        </div>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2.5">ยืนยัน PIN</label>
        <div class="flex gap-3" id="confirmpin-boxes">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
          <input type="password" inputmode="numeric" maxlength="1" class="pin-box w-12 h-12 text-center text-xl font-bold border-2 border-gray-300 rounded-xl transition">
        </div>
      </div>
      <div id="err-pin" class="hidden bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-200 mb-4"></div>
      <button onclick="changePin()" id="btn-change-pin" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition">บันทึก PIN ใหม่</button>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-opacity pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAuth();
if (ME) {
  renderLayout('profile');

  // Fill info
  document.getElementById('profile-name').textContent = ME.fullName;
  document.getElementById('profile-role').textContent = ME.role === 'admin' ? '🔑 Admin' : '👤 User';
  document.getElementById('info-empid').textContent = ME.empId;
  document.getElementById('info-dept').textContent = ME.dept || '—';
  document.getElementById('info-phone').textContent = ME.phone || '—';
  document.getElementById('info-email').textContent = ME.email || '—';

  var initEl = document.getElementById('avatar-init');
  if (ME.avatarUrl) {
    var wrap = document.getElementById('avatar-wrap');
    wrap.innerHTML = '';
    var img = document.createElement('img');
    img.src = ME.avatarUrl;
    img.className = 'w-full h-full object-cover';
    wrap.appendChild(img);
  } else {
    initEl.textContent = ME.firstName ? ME.firstName.charAt(0) : '?';
  }

  // ── PIN boxes ──
  function initPinBoxes(containerId) {
    var boxes = document.querySelectorAll('#' + containerId + ' .pin-box');
    boxes.forEach(function(box, i) {
      box.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g,'').slice(-1);
        if (this.value && i < boxes.length - 1) boxes[i+1].focus();
      });
      box.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) boxes[i-1].focus();
      });
    });
  }
  function getPinValue(cid) {
    return Array.from(document.querySelectorAll('#' + cid + ' .pin-box')).map(function(b){ return b.value; }).join('');
  }
  function clearPinBoxes(cid) {
    document.querySelectorAll('#' + cid + ' .pin-box').forEach(function(b){ b.value=''; });
  }

  initPinBoxes('newpin-boxes');
  initPinBoxes('confirmpin-boxes');

  function changePin() {
    var p1 = getPinValue('newpin-boxes');
    var p2 = getPinValue('confirmpin-boxes');
    var errEl = document.getElementById('err-pin');
    errEl.classList.add('hidden');
    if (p1.length !== 6) { errEl.textContent='กรุณากรอก PIN ให้ครบ 6 หลัก'; errEl.classList.remove('hidden'); return; }
    if (p1 !== p2) { errEl.textContent='PIN ไม่ตรงกัน'; errEl.classList.remove('hidden'); clearPinBoxes('confirmpin-boxes'); return; }

    var btn = document.getElementById('btn-change-pin');
    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

    api({ action: 'setPin', empId: ME.empId, pin: p1 }).then(function(d) {
      if (d.error) throw new Error(d.error);
      clearPinBoxes('newpin-boxes'); clearPinBoxes('confirmpin-boxes');
      showToast('เปลี่ยน PIN เรียบร้อย', 'ok');
    }).catch(function(err) {
      errEl.textContent = err.message; errEl.classList.remove('hidden');
    }).finally(function() {
      btn.disabled = false; btn.textContent = 'บันทึก PIN ใหม่';
    });
  }

  // ── Avatar upload ──
  function uploadAvatar(input) {
    var file = input.files[0]; if (!file) return;
    document.getElementById('avatar-upload-overlay').classList.remove('hidden');
    uploadToImgBB(file).then(function(url) {
      ME.avatarUrl = url;
      setSession(ME);
      var wrap = document.getElementById('avatar-wrap');
      wrap.innerHTML = '<img src="'+url+'" class="w-full h-full object-cover">';
      document.getElementById('avatar-upload-overlay').classList.add('hidden');
      return api({ action: 'updateAvatar', empId: ME.empId, avatarUrl: url });
    }).then(function() {
      showToast('อัปโหลด avatar เรียบร้อย', 'ok');
    }).catch(function() {
      document.getElementById('avatar-upload-overlay').classList.add('hidden');
      showToast('อัปโหลดไม่ได้', 'error');
    });
  }
}
</script>
</body>
</html>
