<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IT Borrow System</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px;min-height:100vh}
a{text-decoration:none}
button,input,select,textarea{font-family:inherit}

/* ── Utility ── */
.hidden{display:none!important}
.flex{display:flex;align-items:center}
.gap8{gap:8px} .gap12{gap:12px} .gap16{gap:16px}
.ml-auto{margin-left:auto}
.text-sm{font-size:12px} .text-xs{font-size:11px}
.text-muted{color:#64748b}
.fw-600{font-weight:600} .fw-700{font-weight:700}
.w-full{width:100%}
.mt8{margin-top:8px} .mt12{margin-top:12px} .mt16{margin-top:16px} .mt24{margin-top:24px}
.mb8{margin-bottom:8px} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* ── Screen ── */
.screen{display:none}
.screen.active{display:block}
#screen-login{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e40af 0%,#0f172a 100%)}
#screen-login.active{display:flex}

/* ── Login ── */
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.login-icon{width:68px;height:68px;border-radius:16px;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:4px}
.login-box .sub{font-size:13px;color:#64748b;margin-bottom:32px}
.inp-label{display:block;text-align:left;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.inp{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;font-weight:600;letter-spacing:2px;text-align:center;outline:none;transition:border-color .15s}
.inp:focus{border-color:#3b82f6}
.inp-normal{letter-spacing:0;font-size:14px;font-weight:400;text-align:left}
.inp-normal:focus{border-color:#3b82f6}
.btn-login-main{width:100%;padding:13px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-login-main:hover{opacity:.9}
.btn-login-main:disabled{opacity:.5;cursor:not-allowed}
.login-err{margin-top:12px;background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;display:none}
.login-err.show{display:block}
.spin-sm{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── App shell ── */
.topbar{background:#1e293b;color:#fff;height:60px;display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.topbar-logo{font-size:20px;font-weight:700;letter-spacing:-.5px}
.topbar-logo span{color:#60a5fa}
.nav-tabs{display:flex;gap:4px;margin-left:16px}
.nav-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.6);background:none;border:none;transition:all .15s}
.nav-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-tab.active{background:rgba(255,255,255,.15);color:#fff}
.user-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-size:13px;display:flex;align-items:center;gap:8px}
.role-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.role-tag.admin{background:#fbbf24;color:#78350f}
.role-tag.user{background:#60a5fa;color:#1e3a8a}
.btn-out{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.btn-out:hover{border-color:rgba(255,255,255,.6);color:#fff}

.content{max-width:1200px;margin:0 auto;padding:24px 20px}

/* ── Cards ── */
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;color:#1e293b;display:flex;align-items:center;gap:8px}

/* ── Stat cards ── */
.stat{display:flex;align-items:center;gap:14px}
.stat-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-ico.blue{background:#dbeafe} .stat-ico.red{background:#fee2e2}
.stat-ico.green{background:#dcfce7} .stat-ico.amber{background:#fef3c7}
.stat-ico.purple{background:#ede9fe}
.stat-num{font-size:26px;font-weight:700;line-height:1}
.stat-lbl{font-size:12px;color:#64748b;margin-top:2px}
.stat-num.blue{color:#1d4ed8} .stat-num.red{color:#dc2626}
.stat-num.green{color:#16a34a} .stat-num.amber{color:#d97706}

/* ── Badges / Status ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-active{background:#dcfce7;color:#166534}
.badge-returned{background:#f1f5f9;color:#475569}
.badge-rejected{background:#fee2e2;color:#991b1b}
.badge-pending_return{background:#ede9fe;color:#6d28d9}
.badge-overdue{background:#fee2e2;color:#991b1b}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-ok{background:#dcfce7;color:#166534}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-pending{background:#f59e0b}
.dot-active{background:#22c55e;animation:pulse 1.5s infinite}
.dot-returned{background:#94a3b8}
.dot-rejected{background:#ef4444}
.dot-pending_return{background:#8b5cf6;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-primary:hover:not(:disabled){background:#1e40af}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover:not(:disabled){background:#15803d}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.btn-ghost:hover:not(:disabled){background:#e2e8f0}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:7px;border-radius:8px}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8fafc;padding:10px 14px;text-align:left;font-weight:600;color:#374151;font-size:12px;border-bottom:2px solid #e2e8f0;white-space:nowrap}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
td{padding:10px 14px;vertical-align:middle}
td.nowrap{white-space:nowrap}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:600;color:#374151}
.form-group select,.form-group input,.form-group textarea{padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;transition:border-color .15s;background:#fff}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:#3b82f6}
.form-group textarea{resize:vertical;min-height:70px}

/* ── Equipment grid ── */
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.eq-card{border:2px solid #e2e8f0;border-radius:12px;padding:16px;background:#fff;transition:all .15s;cursor:pointer}
.eq-card:hover{border-color:#3b82f6;box-shadow:0 4px 12px rgba(59,130,246,.15)}
.eq-card.selected{border-color:#1d4ed8;background:#eff6ff}
.eq-card.unavailable{opacity:.5;cursor:not-allowed;pointer-events:none}
.eq-name{font-weight:700;font-size:14px;margin-bottom:4px}
.eq-cat{font-size:11px;color:#64748b;margin-bottom:8px}
.eq-avail{display:flex;align-items:center;gap:6px}
.avail-bar{flex:1;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.avail-fill{height:100%;border-radius:3px;background:#22c55e;transition:width .3s}
.avail-fill.low{background:#f59e0b}
.avail-fill.empty{background:#ef4444}
.eq-qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:10px}
.qty-btn{width:28px;height:28px;border:1.5px solid #e2e8f0;border-radius:6px;background:#f8fafc;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#e2e8f0}

/* ── Cart ── */
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8fafc;border-radius:8px;margin-bottom:8px}
.cart-item:last-child{margin-bottom:0}

/* ── Loading / empty ── */
.loader{text-align:center;padding:48px;color:#94a3b8}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
.empty{text-align:center;padding:56px 24px;color:#94a3b8}
.empty .ico{font-size:48px;margin-bottom:12px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* ── Tracking rows ── */
.track-row.overdue{background:#fff5f5!important}
.track-row.warning{background:#fffbeb!important}
.days-chip{display:inline-block;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700}
.days-chip.overdue{background:#fee2e2;color:#991b1b}
.days-chip.warning{background:#fef3c7;color:#92400e}
.days-chip.ok{background:#dcfce7;color:#166534}

/* ── Divider ── */
hr{border:none;border-top:1px solid #e2e8f0;margin:16px 0}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;opacity:0;transform:translateY(6px);transition:all .25s;z-index:500;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.s{background:#16a34a}
#toast.e{background:#dc2626}
#toast.i{background:#1d4ed8}

/* ── Avatar ── */
.avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #e2e8f0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:30px;color:#94a3b8;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-sm{width:38px;height:38px;font-size:16px;border-width:2px}
.avatar-lg{width:100px;height:100px;font-size:40px}
.upload-zone{border:2px dashed #cbd5e1;border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.upload-zone:hover{border-color:#3b82f6;background:#f0f9ff}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .ico{font-size:24px;margin-bottom:6px}
.upload-zone p{font-size:12px;color:#64748b}
.uploading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;color:#1d4ed8;font-weight:600;gap:8px}

/* ── Equipment Image Gallery ── */
.eq-gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.eq-img-slot{aspect-ratio:1;border-radius:8px;border:2px dashed #e2e8f0;background:#f8fafc;overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s}
.eq-img-slot:hover{border-color:#3b82f6}
.eq-img-slot img{width:100%;height:100%;object-fit:cover}
.eq-img-slot .add-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#cbd5e1}
.eq-img-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.eq-img-slot .del-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.eq-img-slot.has-img{border-color:#22c55e;border-style:solid}

/* ── Equipment card image (browse) ── */
.eq-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:8px;margin-bottom:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:32px;color:#cbd5e1;overflow:hidden}
.eq-card-img img{width:100%;height:100%;object-fit:cover}

/* ── Light box ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center}
#lightbox.hidden{display:none}
#lightbox img{max-width:90vw;max-height:86vh;border-radius:8px;object-fit:contain}
#lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1}
#lightbox-prev,#lightbox-next{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:36px;cursor:pointer;background:none;border:none;padding:0 16px;line-height:1}
#lightbox-prev{left:0} #lightbox-next{right:0}

/* ── Profile page ── */
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:24px}
.profile-info h2{font-size:20px;font-weight:700}
.profile-info p{color:#64748b;font-size:13px;margin-top:3px}

@media(max-width:768px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .nav-tabs{display:none}
  .content{padding:16px}
  .login-box{padding:32px 24px;margin:16px}
}
</style>
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <div class="login-icon">💻</div>
    <h1>IT Borrow System</h1>
    <p class="sub">ระบบยืม-คืนอุปกรณ์ไอที</p>
    <div style="text-align:left">
      <label class="inp-label">รหัสพนักงาน</label>
      <input id="login-input" class="inp" type="text" placeholder="กรอกรหัสพนักงาน"
             maxlength="12" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button id="login-btn" class="btn-login-main" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<!-- ════════════ APP ════════════ -->
<div id="screen-app" class="screen">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">IT<span>Borrow</span></div>
    <nav class="nav-tabs" id="nav-tabs"></nav>
    <div class="flex gap8 ml-auto">
      <div class="user-pill" style="cursor:pointer" onclick="showPage('profile')" title="โปรไฟล์">
        <div id="topbar-avatar" class="avatar avatar-sm">👤</div>
        <span id="topbar-name">—</span>
        <span id="topbar-role" class="role-tag"></span>
      </div>
      <button class="btn-out" onclick="logout()">ออก</button>
    </div>
  </div>

  <!-- Pages -->
  <div class="content">
    <div id="page-home"></div>
    <div id="page-browse" class="hidden"></div>
    <div id="page-borrow" class="hidden"></div>
    <div id="page-myrequests" class="hidden"></div>
    <div id="page-approve" class="hidden"></div>
    <div id="page-tracking" class="hidden"></div>
    <div id="page-equipment" class="hidden"></div>
    <div id="page-profile" class="hidden"></div>
  </div>
</div>

<!-- ════════════ MODALS ════════════ -->
<!-- Approve modal -->
<div id="modal-approve" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">✅ อนุมัติคำขอ</div>
    <div id="modal-approve-body"></div>
    <div class="form-group mt16">
      <label>วันที่คืน (กำหนดจริง)</label>
      <input id="approve-retdate" type="date" class="inp inp-normal">
    </div>
    <div class="form-group mt12">
      <label>หมายเหตุ (ถ้ามี)</label>
      <textarea id="approve-note" class="inp inp-normal" style="letter-spacing:0;text-align:left" placeholder="หมายเหตุจาก admin..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-approve')">ยกเลิก</button>
      <button class="btn btn-success" onclick="submitApprove()">✅ อนุมัติ</button>
    </div>
  </div>
</div>

<!-- Reject modal -->
<div id="modal-reject" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">❌ ปฏิเสธคำขอ</div>
    <div class="form-group">
      <label>เหตุผลที่ปฏิเสธ</label>
      <textarea id="reject-note" class="inp inp-normal" style="letter-spacing:0;text-align:left" placeholder="กรุณาระบุเหตุผล..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-reject')">ยกเลิก</button>
      <button class="btn btn-danger" onclick="submitReject()">❌ ปฏิเสธ</button>
    </div>
  </div>
</div>

<!-- Confirm return modal -->
<div id="modal-confirm-return" class="overlay hidden">
  <div class="modal">
    <div class="modal-title">📥 ยืนยันรับคืนอุปกรณ์</div>
    <div id="modal-return-body"></div>
    <div class="form-group mt12">
      <label>หมายเหตุ (ถ้ามี)</label>
      <textarea id="return-note" class="inp inp-normal" style="letter-spacing:0;text-align:left" placeholder="หมายเหตุ..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm-return')">ยกเลิก</button>
      <button class="btn btn-success" onclick="submitConfirmReturn()">✅ ยืนยันรับคืน</button>
    </div>
  </div>
</div>

<!-- Add equipment modal -->
<div id="modal-add-eq" class="overlay hidden">
  <div class="modal" style="max-width:580px">
    <div class="modal-title">➕ เพิ่มอุปกรณ์</div>
    <div class="form-grid">
      <div class="form-group">
        <label>ชื่อรายการ *</label>
        <input id="eq-name" type="text" class="inp inp-normal" placeholder="เช่น Notebook Dell Latitude">
      </div>
      <div class="form-group">
        <label>รหัสทรัพย์สิน</label>
        <input id="eq-asset" type="text" class="inp inp-normal" placeholder="เช่น TQMIT64050010">
      </div>
      <div class="form-group">
        <label>หมวดหมู่</label>
        <input id="eq-cat" type="text" class="inp inp-normal" placeholder="เช่น Notebook, Monitor">
      </div>
      <div class="form-group">
        <label>จำนวนทั้งหมด *</label>
        <input id="eq-total" type="number" class="inp inp-normal" value="1" min="1">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>ข้อมูลอุปกรณ์ (Spec / รายละเอียด)</label>
        <textarea id="eq-specs" class="inp inp-normal" placeholder="เช่น Intel i5, RAM 8GB, SSD 256GB..." style="min-height:60px"></textarea>
      </div>
    </div>
    <div class="modal-footer">

<script>
// ── CONFIG ──────────────────────────────────────────────────────
var API_URL    = 'https://script.google.com/macros/s/AKfycbyb-Do-iYhboSkj3wDg4ZVstRTilaBV9UHvC3yiMmpKh95sfV3Kg2ZB3UzEH70-3dYFYA/exec'; // ← ใส่ URL Apps Script
var FORM_URL   = 'YOUR_GOOGLE_FORM_URL';          // ← URL Google Form (ถ้าใช้)
var IMGBB_KEY  = 'b37889052f6fd7b7143ff017d07914df'; // ImgBB API Key
// ────────────────────────────────────────────────────────────────

// ── State ────────────────────────────────────────────────────────
var ME       = null; // current user object
var CART     = [];   // borrow cart [{itemId,itemName,qty,avail}]
var EQ_LIST  = [];   // equipment list cache
var ACT_REQ  = null; // request being actioned in modal

// ── API ──────────────────────────────────────────────────────────
function api(params) {
  var url = API_URL + '?' + Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&') + '&_t=' + Date.now();
  return fetch(url).then(function(r) { return r.json(); });
}

// ── Login ─────────────────────────────────────────────────────────
function doLogin() {
  var id = document.getElementById('login-input').value.trim();
  if (!id) { showLoginErr('กรุณากรอกรหัสพนักงาน'); return; }

  if (API_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
    showLoginErr('⚙️ ยังไม่ได้ตั้งค่า API_URL ใน index.html');
    return;
  }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin-sm"></span> กำลังตรวจสอบ...';

  api({ action: 'getEmployee', empId: id })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      if (!data.found) throw new Error(data.reason);
      ME = data;
      enterApp();
    })
    .catch(function(err) {
      showLoginErr('❌ ' + err.message);
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
    });
}

function showLoginErr(msg) {
  var el = document.getElementById('login-err');
  el.textContent = msg;
  el.classList.add('show');
}

function logout() {
  ME = null; CART = []; EQ_LIST = [];
  document.getElementById('login-input').value = '';
  document.getElementById('login-err').classList.remove('show');
  showScreen('login');
}

// ── App init ──────────────────────────────────────────────────────
function enterApp() {
  // topbar
  document.getElementById('topbar-name').textContent = ME.fullName;
  var rt = document.getElementById('topbar-role');
  rt.textContent = ME.role === 'admin' ? 'Admin' : 'User';
  rt.className   = 'role-tag ' + ME.role;
  setTopbarAvatar(ME.avatarUrl);

  // build nav
  var nav = document.getElementById('nav-tabs');
  nav.innerHTML = '';
  var tabs = ME.role === 'admin'
    ? [['home','🏠 หน้าหลัก'],['approve','⏳ อนุมัติ'],['tracking','📍 ติดตาม'],['equipment','📦 อุปกรณ์']]
    : [['home','🏠 หน้าหลัก'],['browse','🔍 เลือกอุปกรณ์'],['myrequests','📋 คำขอของฉัน']];

  tabs.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'nav-tab';
    btn.textContent = t[1];
    btn.dataset.page = t[0];
    btn.onclick = function() { showPage(t[0]); };
    nav.appendChild(btn);
  });

  showScreen('app');
  showPage('home');
}

// ── Screen / Page switching ───────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + name).classList.add('active');
}

function showPage(name) {
  document.querySelectorAll('[id^="page-"]').forEach(function(p) { p.classList.add('hidden'); });
  document.getElementById('page-' + name).classList.remove('hidden');
  document.querySelectorAll('.nav-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.page === name);
  });
  var renderMap = {
    home       : renderHome,
    browse     : renderBrowse,
    borrow     : renderBorrow,
    myrequests : renderMyRequests,
    approve    : renderApprove,
    tracking   : renderTracking,
    equipment  : renderEquipment,
    profile    : renderProfile
  };
  if (renderMap[name]) renderMap[name]();
}

// ── Admin Home ─────────────────────────────────────────────────────
function renderAdminHome(el) {

// ── Browse Equipment ───────────────────────────────────────────────
function renderBrowse() {
  var el = document.getElementById('page-browse');
  el.innerHTML = loadingHtml();
  api({ action: 'getEquipment' }).then(function(data) {
    EQ_LIST = data.items || [];
    buildBrowsePage(el);
  });
}

function buildBrowsePage(el) {
  var cartCount = CART.reduce(function(s,c){return s+c.qty;},0);
  el.innerHTML = '<div class="flex mb16 gap12">'
    + '<h2 class="fw-700" style="font-size:18px">🔍 เลือกอุปกรณ์</h2>'
    + (cartCount > 0
      ? '<button class="btn btn-primary ml-auto" onclick="showPage(\'borrow\')">'
        + '🛒 รายการที่เลือก (' + cartCount + ') →</button>'
      : '<span class="text-muted ml-auto text-sm">คลิกเลือกอุปกรณ์ที่ต้องการ</span>')
    + '</div>'
    + '<div class="eq-grid">'
    + EQ_LIST.map(function(eq) {
        var inCart   = CART.find(function(c){return c.itemId===eq.itemId;});
        var qty      = inCart ? inCart.qty : 0;
        var avail    = eq.availStock;
        var pct      = eq.totalStock > 0 ? Math.round(avail/eq.totalStock*100) : 0;
        var fillCls  = pct<=0?'empty':pct<=30?'low':'';
        var selCls   = qty > 0 ? 'selected' : '';
        var unavail  = avail <= 0 ? 'unavailable' : '';
        var thumb = (eq.images && eq.images[0]) || '';
        return '<div class="eq-card ' + selCls + ' ' + unavail + '" id="eq-' + eq.itemId + '">'
          + '<div class="eq-card-img">'
          + (thumb ? '<img src="'+esc(thumb)+'" alt="'+esc(eq.name)+'" loading="lazy" onclick="openLightbox('+JSON.stringify(eq.images||[])+',0,event)">'
                   : '📦')
          + '</div>'
          + '<div class="eq-name">' + esc(eq.name) + '</div>'
          + (eq.assetCode ? '<div class="text-xs text-muted mb4">รหัสทรัพย์สิน: '+esc(eq.assetCode)+'</div>' : '')
          + '<div class="eq-cat">' + esc(eq.category||'—') + (eq.specs?' · '+esc(eq.specs.substring(0,40)):'') + '</div>'
          + '<div class="eq-avail"><div class="avail-bar"><div class="avail-fill '+fillCls+'" style="width:'+pct+'%"></div></div>'
          + '<span class="text-sm fw-600" style="color:' + (avail>0?'#16a34a':'#dc2626') + '">'
          + avail + '/' + eq.totalStock + '</span></div>'
          + (avail > 0
            ? '<div class="eq-qty-ctrl">'
              + '<button class="qty-btn" onclick="cartDec(\'' + eq.itemId + '\')">−</button>'
              + '<span id="cart-qty-' + eq.itemId + '" style="min-width:24px;text-align:center;font-weight:700">' + qty + '</span>'
              + '<button class="qty-btn" onclick="cartInc(\'' + eq.itemId + '\',' + avail + ')">+</button>'
              + '</div>' : '<div class="text-sm text-muted mt8">ไม่มีในสต็อค</div>')
          + '</div>';
      }).join('')
    + '</div>';
}

function cartInc(itemId, avail) {
  var eq = EQ_LIST.find(function(e){return e.itemId===itemId;});
  var c  = CART.find(function(c){return c.itemId===itemId;});
  if (c) {
    if (c.qty >= avail) return;
    c.qty++;
  } else {
    CART.push({ itemId: itemId, itemName: eq.name, qty: 1, avail: avail });
  }
  buildBrowsePage(document.getElementById('page-browse'));
}
function cartDec(itemId) {
  var idx = CART.findIndex(function(c){return c.itemId===itemId;});
  if (idx === -1) return;
  CART[idx].qty--;
  if (CART[idx].qty <= 0) CART.splice(idx, 1);
  buildBrowsePage(document.getElementById('page-browse'));
}

    + CART.map(function(c){
        return '<div class="cart-item"><span style="flex:1;font-weight:600">'+esc(c.itemName)+'</span>'

          + '<button class="btn btn-ghost btn-sm" onclick="cartRemove(\''+c.itemId+'\')">✕</button></div>';

    + '<div class="form-group"><label>แผนก/ฝ่าย</label>'
    + '<input type="text" class="inp inp-normal" value="' + esc(ME.dept) + '" disabled></div>'

    + '<div class="form-group"><label>เบอร์ติดต่อ</label>'
    + '<input type="text" class="inp inp-normal" value="' + esc(ME.phone) + '" disabled></div>'

    + '<div class="form-group" style="grid-column:1/-1"><label>วัตถุประสงค์ / หมายเหตุ</label>'
    + '<textarea id="borrow-purpose" class="inp inp-normal" placeholder="ระบุวัตถุประสงค์การใช้งาน..."></textarea></div>'

    + '</div>'

    + '</div></div>';
}

function cartRemove(itemId) {
  CART = CART.filter(function(c){return c.itemId!==itemId;});
  if (!CART.length) { showPage('browse'); return; }
  renderBorrow();
}

function submitBorrow() {
  var retDate = document.getElementById('borrow-retdate').value;
  var purpose = document.getElementById('borrow-purpose').value.trim();
  if (!retDate) { toast('กรุณาระบุวันที่ต้องการคืน','e'); return; }

  var btn = document.getElementById('borrow-submit-btn');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';

  api({
    action     : 'createRequest',
    empId      : ME.empId,
    items      : encodeURIComponent(JSON.stringify(CART.map(function(c){return {itemId:c.itemId,qty:c.qty};}))),
    returnDate : retDate,
    purpose    : purpose
  }).then(function(data) {
    if (data.error) throw new Error(data.error);
    CART = [];
    toast('✅ ส่งคำขอสำเร็จ รอการอนุมัติ','s');
    showPage('myrequests');
  }).catch(function(err) {
    toast('❌ ' + err.message,'e');
    btn.disabled = false; btn.textContent = '📤 ส่งคำขอยืม';
  });
}

function doRequestReturn(reqId) {

function openApprove(req) {

    + (req.items||[]).map(function(it){return '<div class="cart-item"><span style="flex:1">'+esc(it.itemName)+'</span><span class="badge badge-active">'+it.qty+'</span></div>';}).join('');

function submitApprove() {

  var note    = document.getElementById('approve-note').value;
  if (!retDate) { toast('กรุณาระบุวันที่คืนจริง','e'); return; }

  api({ action:'approveRequest', requestId:ACT_REQ.requestId, adminId:ME.empId, returnDate:retDate, note:note })
    .then(function(d) {
      if (d.error) throw new Error(d.error);

      toast('✅ อนุมัติสำเร็จ','s');
      renderApprove();
    }).catch(function(e){ toast('❌ '+e.message,'e'); });
}

function openEditEqImages(eq) {

    (eq.images&&eq.images[1])||'',

      + '<div class="modal-title" id="modal-eq-images-title">🖼️ รูปภาพอุปกรณ์</div>'

      + '<button class="btn btn-primary" onclick="saveEqImages()">💾 บันทึกรูปภาพ</button>'

function renderEqImageGallery() {
  var g = document.getElementById('eq-img-gallery');
  if (!g) return;
  g.innerHTML = EQ_IMG_STATE.map(function(url, i) {
    var hasImg = !!url;
    return '<div class="eq-img-slot '+(hasImg?'has-img':'')+'" id="eq-slot-'+i+'">'
      + (hasImg
        ? '<img src="'+esc(url)+'" alt="รูป '+(i+1)+'" onclick="openLightbox(EQ_IMG_STATE,'+i+',event)">'
          + '<button class="del-btn" onclick="removeEqImg('+i+',event)">✕</button>'
        : '<span class="add-ico">+</span>')
      + '<div id="eq-slot-overlay-'+i+'" class="uploading-overlay hidden"><span class="spin-sm"></span> กำลังอัปโหลด...</div>'
      + (hasImg ? '' : '<input type="file" accept="image/*" onchange="uploadEqImg('+i+',this)">')
      + '</div>';
  }).join('');
}

function removeEqImg(idx, e) {
  e.stopPropagation();
  EQ_IMG_STATE[idx] = '';
  renderEqImageGallery();
}

function uploadEqImg(idx, input) {
  var file = input.files[0];
  if (!file) return;
  var overlay = document.getElementById('eq-slot-overlay-'+idx);
  if (overlay) overlay.classList.remove('hidden');
  uploadToImgBB(file)
    .then(function(url) {
      EQ_IMG_STATE[idx] = url;
      renderEqImageGallery();
    })
    .catch(function(err) {
      toast('❌ อัปโหลดรูปไม่สำเร็จ: '+err.message,'e');
      if (overlay) overlay.classList.add('hidden');
    });
}

function saveEqImages() {
  if (!EQ_EDIT_ITEM) return;
  var params = { action:'updateEquipmentImages', itemId: EQ_EDIT_ITEM.itemId };
  EQ_IMG_STATE.forEach(function(u,i){ params['img'+(i+1)] = u; });
  api(params).then(function(d) {
    if (d.error) throw new Error(d.error);
    closeModal('modal-eq-images');
    toast('✅ บันทึกรูปภาพสำเร็จ','s');
    renderEquipment();
  }).catch(function(e){ toast('❌ '+e.message,'e'); });
}

// ── ImgBB Upload ──────────────────────────────────────────────────
function uploadToImgBB(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = e.target.result.split(',')[1];
      var fd = new FormData();
      fd.append('key', IMGBB_KEY);
      fd.append('image', base64);
      fd.append('name', file.name);
      fetch('https://api.imgbb.com/1/upload', { method:'POST', body:fd })
        .then(function(r){ return r.json(); })
        .then(function(data) {
          if (data.success) resolve(data.data.url);
          else reject(new Error(data.error ? data.error.message : 'Upload failed'));
        })
        .catch(reject);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Lightbox ──────────────────────────────────────────────────────
var LB_IMGS  = [];
var LB_IDX   = 0;

function openLightbox(imgs, idx, e) {
  if (e) e.stopPropagation();
  LB_IMGS = (Array.isArray(imgs) ? imgs : [imgs]).filter(Boolean);
  if (!LB_IMGS.length) return;
  LB_IDX  = idx || 0;
  document.getElementById('lightbox-img').src = LB_IMGS[LB_IDX];
  document.getElementById('lightbox').classList.remove('hidden');
  document.getElementById('lightbox-prev').style.display = LB_IMGS.length > 1 ? '' : 'none';
  document.getElementById('lightbox-next').style.display = LB_IMGS.length > 1 ? '' : 'none';
}
function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
function lbNav(dir) {
  LB_IDX = (LB_IDX + dir + LB_IMGS.length) % LB_IMGS.length;
  document.getElementById('lightbox-img').src = LB_IMGS[LB_IDX];
}
document.addEventListener('keydown', function(e) {
  if (document.getElementById('lightbox').classList.contains('hidden')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

  else if (r.urgency === 'warning')

  else if (r.daysLeft !== null)
    chip = '<span class="days-chip ok">อีก ' + r.daysLeft + ' วัน</span>';
  else
    chip = '<span class="text-muted text-sm">—</span>';

  return '<tr class="track-row ' + r.urgency + '">'
    + '<td class="nowrap text-xs text-muted">'+esc(r.requestId)+'</td>'
    + '<td><div class="fw-600">'+esc(r.empName)+'</div><div class="text-xs text-muted">'+esc(r.dept)+'</div></td>'

    + '<td>'+statusBadge(r.status)+'</td>'
    + '<td>'+chip+'</td>'

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function todayStr() {
  var d = new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  return d.toISOString().split('T')[0];
}
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + (type||'i');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = ''; }, 3500);
}
