<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f8fafc; }
  .animate-fade-in {
    animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

<div id="layout-wrapper" class="lg:ml-64 pt-16 min-h-screen">
  <main class="p-6 md:p-8 flex-1">
    <div id="page-content" class="animate-fade-in">
      <div class="flex items-center justify-center py-20 text-slate-400">
        <svg class="animate-spin w-6 h-6 mr-2 text-brand-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
        <span class="font-medium text-sm">กำลังโหลดข้อมูล...</span>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAuth();
if (ME) {
  renderLayout('index');

  var content = document.getElementById('page-content');

  if (ME.role === 'admin') {
    renderAdminHome();
  } else {
    renderUserHome();
  }

  function renderAdminHome() {
    Promise.all([
      api({ action: 'getAllRequests' }),
      api({ action: 'getEquipment' }),
      api({ action: 'getTracking' })
    ]).then(function(results) {
      var reqs = results[0].requests || [];
      var eqs  = results[1].items || [];
      var tracking = results[2].items || [];

      var pending  = reqs.filter(function(r){ return r.status==='pending'; }).length;
      var active   = reqs.filter(function(r){ return r.status==='active'||r.status==='pending_return'; }).length;
      var overdue  = tracking.filter(function(r){ return r.urgency==='overdue'; }).length;
      var totalEq  = eqs.length;

      content.innerHTML =
        '<div class="mb-8"><h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">สวัสดี, ' + ME.firstName + ' 👋</h1>'
        + '<p class="text-sm font-medium text-slate-500 mt-1">ยินดีต้อนรับสู่ระบบบริหารจัดการ IT Borrow System</p></div>'

        + '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">'
        + statCard('คำขอรออนุมัติ', pending, 'text-amber-600', 'bg-amber-50 ring-1 ring-amber-100', 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')
        + statCard('กำลังยืมอุปกรณ์', active, 'text-brand-600', 'bg-brand-50 ring-1 ring-brand-100', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')
        + statCard('ยืมเกินกำหนดคืน', overdue, 'text-rose-600', 'bg-rose-50 ring-1 ring-rose-100', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z')
        + statCard('รายการอุปกรณ์ทั้งหมด', totalEq, 'text-emerald-600', 'bg-emerald-50 ring-1 ring-emerald-100', 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4')
        + '</div>'

        + '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">'
        + '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/50">'
        + '<div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100"><h3 class="font-bold text-slate-800 tracking-tight">คำขอที่รออนุมัติ</h3>'
        + '<a href="approve.html" class="text-xs font-bold text-brand-600 bg-brand-50 hover:bg-brand-100 px-3 py-1.5 rounded-xl transition">จัดการทั้งหมด →</a></div>'
        + renderRecentRequests(reqs.filter(function(r){return r.status==='pending';}).slice(0,5))
        + '</div>'
        + '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/50">'
        + '<div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100"><h3 class="font-bold text-slate-800 tracking-tight">แจ้งเตือนยืมเกินกำหนด</h3>'
        + '<a href="tracking.html" class="text-xs font-bold text-brand-600 bg-brand-50 hover:bg-brand-100 px-3 py-1.5 rounded-xl transition">ติดตามทั้งหมด →</a></div>'
        + renderOverdueList(tracking.filter(function(r){return r.urgency==='overdue'||r.urgency==='warning';}).slice(0,5))
        + '</div>'
        + '</div>';
    }).catch(function() {
      content.innerHTML = '<div class="text-rose-500 text-sm bg-rose-50 border border-rose-100 p-4 rounded-2xl">ไม่สามารถดึงข้อมูลได้ กรุณารีเฟรชหน้าใหม่อีกครั้ง</div>';
    });
  }

  function renderUserHome() {
    api({ action: 'getMyRequests', empId: ME.empId }).then(function(data) {
      var reqs = data.requests || [];
      var active = reqs.filter(function(r){ return r.status==='active'||r.status==='pending_return'; });
      var pending = reqs.filter(function(r){ return r.status==='pending'; });

      content.innerHTML =
        '<div class="mb-8"><h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">สวัสดี, ' + ME.firstName + ' 👋</h1>'
        + '<p class="text-sm font-medium text-slate-500 mt-1">คุณสามารถทำรายการยืมอุปกรณ์และตรวจสอบสถานะได้ที่นี่</p></div>'

        + '<div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">'
        + statCard('กำลังยืมอยู่', active.length, 'text-brand-600', 'bg-brand-50 ring-1 ring-brand-100', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')
        + statCard('รออนุมัติ', pending.length, 'text-amber-600', 'bg-amber-50 ring-1 ring-amber-100', 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')
        + statCard('คำขอทั้งหมด', reqs.length, 'text-slate-600', 'bg-slate-50 ring-1 ring-slate-100', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')
        + '</div>'

        + '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">'
        + '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/50">'
        + '<div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100"><h3 class="font-bold text-slate-800 tracking-tight">รายการที่กำลังยืมอยู่</h3>'
        + '<a href="myrequests.html" class="text-xs font-bold text-brand-600 bg-brand-50 hover:bg-brand-100 px-3 py-1.5 rounded-xl transition">ประวัติทั้งหมด →</a></div>'
        + renderRecentRequests(active.slice(0,5))
        + '</div>'
        + '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/50">'
        + '<h3 class="font-bold text-slate-800 tracking-tight mb-5 pb-4 border-b border-slate-100">เริ่มต้นทำรายการ</h3>'
        + '<a href="borrow.html" class="flex items-center gap-4 p-4.5 bg-brand-50/50 hover:bg-brand-50 border border-brand-100/50 rounded-2xl transition mb-4 group">'
        + '<div class="w-12 h-12 bg-brand-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-brand-600/15 group-hover:scale-105 duration-200"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></div>'
        + '<div><p class="font-bold text-slate-800 text-sm">ค้นหาและยืมอุปกรณ์</p><p class="text-xs text-slate-500 mt-0.5">เลือกอุปกรณ์ไอทีที่ต้องการจากระบบและส่งคำขอ</p></div></a>'
        + '<a href="myrequests.html" class="flex items-center gap-4 p-4.5 bg-slate-50 hover:bg-slate-100/70 border border-slate-200/50 rounded-2xl transition group">'
        + '<div class="w-12 h-12 bg-slate-800 text-white rounded-xl flex items-center justify-center shadow-lg shadow-slate-800/15 group-hover:scale-105 duration-200"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></div>'
        + '<div><p class="font-bold text-slate-800 text-sm">ประวัติและการทำคืน</p><p class="text-xs text-slate-500 mt-0.5">ตรวจสอบสถานะคำขอยืม และส่งแจ้งการส่งคืนอุปกรณ์</p></div></a>'
        + '</div>'
        + '</div>';
    }).catch(function() {
      content.innerHTML = '<div class="text-rose-500 text-sm bg-rose-50 border border-rose-100 p-4 rounded-2xl">ไม่สามารถดึงข้อมูลได้ กรุณารีเฟรชหน้าใหม่อีกครั้ง</div>';
    });
  }

  function statCard(label, val, textCls, bgCls, iconPath) {
    return '<div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm shadow-slate-100/30 flex items-center justify-between">'
      + '<div class="min-w-0"><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider">' + label + '</p>'
      + '<p class="text-3xl font-extrabold text-slate-900 mt-2 tracking-tight">' + val + '</p></div></div>'
      + '<div class="w-12 h-12 ' + bgCls + ' rounded-2xl flex items-center justify-center ' + textCls + ' shadow-sm">'
      + '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="' + iconPath + '"></path></svg>'
      + '</div></div>';
  }

  function renderRecentRequests(reqs) {
    if (!reqs.length) return '<p class="text-sm text-slate-400 text-center py-8">ไม่มีรายการคำขอในหน้านี้</p>';
    var statusMap = { pending:'รออนุมัติ', active:'กำลังยืม', pending_return:'รอคืน', returned:'คืนแล้ว', rejected:'ปฏิเสธ', approved:'อนุมัติ' };
    var colorMap = { pending:'bg-amber-50 text-amber-700 ring-1 ring-amber-600/10', active:'bg-brand-50 text-brand-700 ring-1 ring-brand-600/10', pending_return:'bg-purple-50 text-purple-700 ring-1 ring-purple-600/10', returned:'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/10', rejected:'bg-rose-50 text-rose-700 ring-1 ring-rose-600/10' };
    
    return '<div class="divide-y divide-slate-100">' + reqs.map(function(r) {
      var cls = colorMap[r.status] || 'bg-slate-50 text-slate-600';
      var itemsHtml = '';
      if (r.items && r.items.length > 0) {
        itemsHtml = '<div class="mt-1.5 flex flex-wrap gap-1.5">' + r.items.map(function(it) {
          return '<span class="text-[11px] font-medium text-slate-600 bg-slate-50 border border-slate-200/60 px-2 py-0.5 rounded-lg">' + it.itemName + ' (x' + it.qty + ')</span>';
        }).join('') + '</div>';
      }

      return '<div class="flex items-start justify-between py-4.5 first:pt-0 last:pb-0">'
        + '<div class="min-w-0 pr-3">'
        + '<p class="text-sm font-bold text-slate-800 truncate">' + r.empName + ' <span class="text-slate-400 font-medium text-xs">(' + r.dept + ')</span></p>'
        + '<p class="text-[11px] font-semibold text-slate-400 mt-0.5">' + r.requestedAt + '</p>'
        + itemsHtml
        + '</div>'
        + '<span class="px-2.5 py-1 rounded-full text-[11px] font-bold flex-shrink-0 ' + cls + '">' + (statusMap[r.status]||r.status) + '</span>'
        + '</div>';
    }).join('') + '</div>';
  }

  function renderOverdueList(items) {
    if (!items.length) return '<p class="text-sm text-slate-400 text-center py-8">ไม่มีรายการค้างส่งคืนเกินกำหนด 🎉</p>';
    
    return '<div class="divide-y divide-slate-100">' + items.map(function(r) {
      var cls = r.urgency === 'overdue' ? 'bg-rose-50 text-rose-700 ring-1 ring-rose-600/10' : 'bg-amber-50 text-amber-700 ring-1 ring-amber-600/10';
      var label = r.urgency === 'overdue' ? 'เกินกำหนด ' + Math.abs(r.daysLeft) + ' วัน' : 'ครบกำหนดใน ' + r.daysLeft + ' วัน';
      
      return '<div class="flex items-center justify-between py-4 first:pt-0 last:pb-0">'
        + '<div class="min-w-0 pr-3"><p class="text-sm font-bold text-slate-800 truncate">' + r.empName + '</p>'
        + '<p class="text-xs text-slate-400 font-semibold mt-0.5">' + r.dept + ' · วันที่ต้องคืน: ' + (r.returnDate || '—') + '</p></div>'
        + '<span class="px-2.5 py-1 rounded-full text-[11px] font-bold flex-shrink-0 ' + cls + '">' + label + '</span>'
        + '</div>';
    }).join('') + '</div>';
  }
}
</script>
</body>
</html>
