<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — IT Borrow System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Sarabun',sans-serif;}</style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="layout-wrapper" class="ml-64 pt-16 min-h-screen">
  <main class="p-6">
    <div id="page-content">
      <div class="flex items-center justify-center py-20 text-gray-400">
        <svg class="animate-spin w-6 h-6 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
        กำลังโหลด...
      </div>
    </div>
  </main>
</div>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-xl text-sm font-medium shadow-lg z-50 opacity-0 transition-opacity pointer-events-none"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
var ME = requireAuth();
if (ME) {
  renderLayout('index');

  var content = document.getElementById('page-content');

  if (ME.role === 'admin') {
    renderAdminHome();
  } else {
    renderUserHome();
  }

  function renderAdminHome() {
    // Load stats
    Promise.all([
      api({ action: 'getAllRequests' }),
      api({ action: 'getEquipment' }),
      api({ action: 'getTracking' })
    ]).then(function(results) {
      var reqs = results[0].requests || [];
      var eqs  = results[1].items || [];
      var tracking = results[2].items || [];

      var pending  = reqs.filter(function(r){ return r.status==='pending'; }).length;
      var active   = reqs.filter(function(r){ return r.status==='active'||r.status==='pending_return'; }).length;
      var overdue  = tracking.filter(function(r){ return r.urgency==='overdue'; }).length;
      var totalEq  = eqs.length;

      content.innerHTML =
        '<div class="mb-6"><h1 class="text-xl font-bold text-gray-900">สวัสดี, ' + ME.firstName + ' 👋</h1>'
        + '<p class="text-sm text-gray-500 mt-0.5">ภาพรวมระบบ IT Borrow</p></div>'

        + '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">'
        + statCard('รออนุมัติ', pending, 'text-yellow-600', 'bg-yellow-50', 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')
        + statCard('กำลังยืม', active, 'text-blue-600', 'bg-blue-50', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')
        + statCard('เกินกำหนด', overdue, 'text-red-600', 'bg-red-50', 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z')
        + statCard('อุปกรณ์ทั้งหมด', totalEq, 'text-green-600', 'bg-green-50', 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4')
        + '</div>'

        + '<div class="grid lg:grid-cols-2 gap-4">'
        + '<div class="bg-white rounded-2xl border border-gray-200 p-5">'
        + '<div class="flex items-center justify-between mb-4"><h3 class="font-semibold text-gray-800">คำขอรออนุมัติ</h3>'
        + '<a href="approve.html" class="text-sm text-blue-600 hover:underline">ดูทั้งหมด →</a></div>'
        + renderRecentRequests(reqs.filter(function(r){return r.status==='pending';}).slice(0,5))
        + '</div>'
        + '<div class="bg-white rounded-2xl border border-gray-200 p-5">'
        + '<div class="flex items-center justify-between mb-4"><h3 class="font-semibold text-gray-800">แจ้งเตือนเกินกำหนด</h3>'
        + '<a href="tracking.html" class="text-sm text-blue-600 hover:underline">ดูทั้งหมด →</a></div>'
        + renderOverdueList(tracking.filter(function(r){return r.urgency==='overdue'||r.urgency==='warning';}).slice(0,5))
        + '</div>'
        + '</div>';
    }).catch(function() {
      content.innerHTML = '<div class="text-red-500 text-sm">โหลดข้อมูลไม่ได้ กรุณา refresh</div>';
    });
  }

  function renderUserHome() {
    api({ action: 'getMyRequests', empId: ME.empId }).then(function(data) {
      var reqs = data.requests || [];
      var active = reqs.filter(function(r){ return r.status==='active'||r.status==='pending_return'; });
      var pending = reqs.filter(function(r){ return r.status==='pending'; });

      content.innerHTML =
        '<div class="mb-6"><h1 class="text-xl font-bold text-gray-900">สวัสดี, ' + ME.firstName + ' 👋</h1>'
        + '<p class="text-sm text-gray-500 mt-0.5">ยินดีต้อนรับสู่ระบบยืม-คืนอุปกรณ์</p></div>'

        + '<div class="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-6">'
        + statCard('กำลังยืม', active.length, 'text-blue-600', 'bg-blue-50', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')
        + statCard('รออนุมัติ', pending.length, 'text-yellow-600', 'bg-yellow-50', 'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z')
        + statCard('ทั้งหมด', reqs.length, 'text-gray-600', 'bg-gray-50', 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2')
        + '</div>'

        + '<div class="grid lg:grid-cols-2 gap-4">'
        + '<div class="bg-white rounded-2xl border border-gray-200 p-5">'
        + '<div class="flex items-center justify-between mb-4"><h3 class="font-semibold text-gray-800">รายการที่กำลังยืม</h3>'
        + '<a href="myrequests.html" class="text-sm text-blue-600 hover:underline">ดูทั้งหมด →</a></div>'
        + renderRecentRequests(active.slice(0,5))
        + '</div>'
        + '<div class="bg-white rounded-2xl border border-gray-200 p-5">'
        + '<h3 class="font-semibold text-gray-800 mb-4">เริ่มต้นใช้งาน</h3>'
        + '<a href="borrow.html" class="flex items-center gap-3 p-4 bg-blue-50 rounded-xl hover:bg-blue-100 transition mb-3">'
        + '<div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></div>'
        + '<div><p class="font-semibold text-gray-800 text-sm">ยืมอุปกรณ์</p><p class="text-xs text-gray-500">ค้นหาและยืมอุปกรณ์ที่ต้องการ</p></div></a>'
        + '<a href="myrequests.html" class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition">'
        + '<div class="w-10 h-10 bg-gray-600 rounded-lg flex items-center justify-center text-white"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></div>'
        + '<div><p class="font-semibold text-gray-800 text-sm">ประวัติคำขอ</p><p class="text-xs text-gray-500">ตรวจสอบสถานะคำขอของคุณ</p></div></a>'
        + '</div>'
        + '</div>';
    });
  }

  function statCard(label, val, textCls, bgCls, iconPath) {
    return '<div class="bg-white rounded-2xl border border-gray-200 p-5">'
      + '<div class="flex items-start justify-between">'
      + '<div><p class="text-sm text-gray-500">' + label + '</p>'
      + '<p class="text-3xl font-bold text-gray-900 mt-1">' + val + '</p></div>'
      + '<div class="w-10 h-10 ' + bgCls + ' rounded-xl flex items-center justify-center ' + textCls + '">'
      + '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="' + iconPath + '"></path></svg>'
      + '</div></div></div>';
  }

  function renderRecentRequests(reqs) {
    if (!reqs.length) return '<p class="text-sm text-gray-400 text-center py-6">ไม่มีรายการ</p>';
    var statusMap = { pending:'รออนุมัติ', active:'กำลังยืม', pending_return:'รอคืน', returned:'คืนแล้ว', rejected:'ปฏิเสธ', approved:'อนุมัติ' };
    var colorMap = { pending:'bg-yellow-100 text-yellow-700', active:'bg-blue-100 text-blue-700', pending_return:'bg-purple-100 text-purple-700', returned:'bg-green-100 text-green-700', rejected:'bg-red-100 text-red-700' };
    return reqs.map(function(r) {
      var cls = colorMap[r.status] || 'bg-gray-100 text-gray-600';
      return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">'
        + '<div class="min-w-0"><p class="text-sm font-medium text-gray-800 truncate">' + r.empName + '</p>'
        + '<p class="text-xs text-gray-400">' + r.requestedAt + '</p></div>'
        + '<span class="ml-3 px-2.5 py-1 rounded-full text-xs font-semibold flex-shrink-0 ' + cls + '">' + (statusMap[r.status]||r.status) + '</span>'
        + '</div>';
    }).join('');
  }

  function renderOverdueList(items) {
    if (!items.length) return '<p class="text-sm text-gray-400 text-center py-6">ไม่มีรายการเกินกำหนด 🎉</p>';
    return items.map(function(r) {
      var cls = r.urgency === 'overdue' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';
      var label = r.urgency === 'overdue' ? 'เกิน ' + Math.abs(r.daysLeft) + ' วัน' : 'อีก ' + r.daysLeft + ' วัน';
      return '<div class="flex items-center justify-between py-3 border-b border-gray-100 last:border-0">'
        + '<div class="min-w-0"><p class="text-sm font-medium text-gray-800 truncate">' + r.empName + '</p>'
        + '<p class="text-xs text-gray-400">' + r.dept + '</p></div>'
        + '<span class="ml-3 px-2.5 py-1 rounded-full text-xs font-semibold flex-shrink-0 ' + cls + '">' + label + '</span>'
        + '</div>';
    }).join('');
  }
}
</script>
</body>
</html>
